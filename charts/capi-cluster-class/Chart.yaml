apiVersion: v2
name: capi-cluster-class
description: |
  Reusable CAPI topology for CAPN unprivileged kubeadm path: ClusterClass,
  KubeadmControlPlaneTemplate, KubeadmConfigTemplate, LXCClusterTemplate,
  LXCMachineTemplate (control plane + worker). See PLAN-stage1-3.md §16.2.
type: application

# Chart.Version is the single source of truth for CR name rotation
# (PLAN §16.2 — CAPI webhook blocks most field edits on referenced
# ClusterClass/*Template CRs, so every values/template change must bump
# this version to produce fresh object names).
version: 0.3.0

# Chart.appVersion tracks the CAPN provider it is tested against.
# PLAN §8 k8s_lab_capn_provider_version (verified 2026-04-21).
appVersion: "0.8.5"

kubeVersion: ">=1.31.0-0"

keywords:
  - cluster-api
  - capn
  - clusterclass
  - kubeadm

home: https://capn.linuxcontainers.org/

sources:
  - https://github.com/lxc/cluster-api-provider-incus
  - https://cluster-api.sigs.k8s.io/
