{{- include "capi-cluster-class.requireKubeadm" . -}}
{{- $cp := .Values.controlPlane -}}
{{- $hasClusterCfg := or (not (empty $cp.featureGates)) (not (empty $cp.apiServerExtraArgs)) (not (empty $cp.controllerManagerExtraArgs)) (not (empty $cp.schedulerExtraArgs)) -}}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlaneTemplate
metadata:
  name: {{ include "capi-cluster-class.kubeadmControlPlaneTemplateName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "capi-cluster-class.labels" . | nindent 4 }}
spec:
  template:
    spec:
      kubeadmConfigSpec:
        # Substrate-required: CAPN consumes cloud-init user-data on
        # every LXC node to bootstrap kubeadm. `ignition` format is
        # for Flatcar/CoreOS hosts which our substrate does not use.
        # Not user-tunable (memory rule "Chart-required values are
        # hardcoded"). Also satisfies CAPI v1beta2 CRD constraint
        # `kubeadmConfigSpec.minProperties >= 1` even when every
        # tunable below is empty.
        format: cloud-config
        {{- if $hasClusterCfg }}
        clusterConfiguration:
          {{- with $cp.featureGates }}
          featureGates:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cp.apiServerExtraArgs }}
          apiServer:
            extraArgs:
              {{- toYaml . | nindent 14 }}
          {{- end }}
          {{- with $cp.controllerManagerExtraArgs }}
          controllerManager:
            extraArgs:
              {{- toYaml . | nindent 14 }}
          {{- end }}
          {{- with $cp.schedulerExtraArgs }}
          scheduler:
            extraArgs:
              {{- toYaml . | nindent 14 }}
          {{- end }}
        {{- end }}
        # init / join nodeRegistration baseline.
        #
        # Substrate-required `kubeletExtraArgs` baseline ALWAYS emitted:
        #   feature-gates=KubeletInUserNamespace=true
        # CAPN provisions every workload node as an unprivileged LXC
        # container; kubelet's `oomWatcher` constructor opens
        # /dev/kmsg and refuses to start when the open is not
        # permitted (which it isn't in unprivileged userns). The
        # `KubeletInUserNamespace` feature gate tells kubelet to
        # ignore the oomWatcher init failure and continue. Without
        # it kubelet enters Restart=always crash loop and `kubeadm
        # init` times out at `wait-control-plane`.
        #
        # Consumer extras from `.Values.controlPlane.kubeletExtraArgs`
        # append after the baseline. CAPI v1beta2 CRD requires
        # `[]{name,value}` list shape and `minItems: 1` — emitting
        # the baseline always also satisfies that constraint.
        initConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              - name: feature-gates
                value: "KubeletInUserNamespace=true"
              {{- with $cp.kubeletExtraArgs }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
        joinConfiguration:
          nodeRegistration:
            kubeletExtraArgs:
              - name: feature-gates
                value: "KubeletInUserNamespace=true"
              {{- with $cp.kubeletExtraArgs }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
        {{- with $cp.preKubeadmCommands }}
        preKubeadmCommands:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $cp.postKubeadmCommands }}
        postKubeadmCommands:
          {{- toYaml . | nindent 10 }}
        {{- end }}
