{{- include "capi-cluster-class.requireCAPN" . -}}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha2
kind: LXCClusterTemplate
metadata:
  name: {{ include "capi-cluster-class.lxcClusterTemplateName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "capi-cluster-class.labels" . | nindent 4 }}
spec:
  template:
    spec:
      # CAPN v1alpha2 LXCClusterSpec. Project scoping is owned by the
      # identity Secret referenced here — there is no separate project
      # field on LXCCluster (verified against CAPN v0.8.5 CRD).
      secretRef:
        name: {{ .Values.capn.infrastructureSecretName | quote }}
      # Substrate-required: unprivileged LXC containers are the only
      # supported MVP path (PLAN §2.8 / §3.1). Not exposed as a value.
      unprivileged: true
      # Substrate-required: role lxd_profiles already ships kubeadm
      # prerequisites under capi-base / capi-controlplane / capi-worker
      # (PLAN §13.6). Letting CAPN auto-create its own kubeadm profile
      # would conflict on unprivileged containers.
      skipDefaultKubeadmProfile: true
      # Substrate-required for MVP: no external cloud-controller-manager
      # — CAPN's cloud-init provider-id kubelet-arg substitution is
      # sufficient. Stage 2 CCM wiring is a separate plan §.
      cloudProviderNodePatch: false
      # loadBalancer is a REQUIRED field on CAPN v1alpha2
      # LXCClusterTemplate. For the `lxc` mode (haproxy LXC instance,
      # MVP default) the chart hardcodes the substrate-required
      # `instanceSpec.profiles: [capi-base, ...profilesExtra]`
      # baseline — the LB container needs a root-disk device and an
      # internal-net NIC, both of which `capi-base` (role
      # lxd_profiles, PLAN §13.6) supplies. Without this CAPN aborts
      # with "No root device could be found" at instance-creation
      # time.
      #
      # CAPN v0.8.x LXCLoadBalancerSpec shape:
      #   loadBalancer.lxc:
      #     instanceSpec:        { profiles, image, flavor, target }
      #     customHAProxyConfigTemplate: <string>
      #     disableHealthzCheck:         <bool>
      # consumer-tunable knobs are exposed below; substrate-required
      # profile baseline is fixed in templates/_helpers.tpl.
      #
      # For the other modes (`kubeVIP`, `oci`, `ovn`, `external`) the
      # block is passed through verbatim — those LB types do not spawn
      # an LXD instance the chart has to provision.
      loadBalancer:
        {{- if hasKey .Values.loadBalancer "lxc" }}
        {{- $lxc := .Values.loadBalancer.lxc | default dict }}
        lxc:
          instanceSpec:
            profiles:
              {{- include "capi-cluster-class.loadBalancerProfiles" . | nindent 14 }}
            {{- with $lxc.image }}
            image:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- with $lxc.flavor }}
            flavor: {{ . | quote }}
            {{- end }}
            {{- with $lxc.target }}
            target: {{ . | quote }}
            {{- end }}
          {{- with $lxc.customHAProxyConfigTemplate }}
          customHAProxyConfigTemplate: |
            {{- . | nindent 12 }}
          {{- end }}
          {{- if $lxc.disableHealthzCheck | default false }}
          disableHealthzCheck: true
          {{- end }}
        {{- else }}
        {{- toYaml .Values.loadBalancer | nindent 8 }}
        {{- end }}
