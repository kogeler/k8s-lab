{{- include "capi-cluster-class.requireKubeadm" . -}}
{{- $w := .Values.worker -}}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: {{ include "capi-cluster-class.kubeadmConfigTemplateWorkerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "capi-cluster-class.labels" . | nindent 4 }}
    cluster.x-k8s.io/role: worker
spec:
  template:
    spec:
      # Substrate-required baseline (see kubeadm-control-plane-template
      # for rationale). Also satisfies CAPI v1beta2 CRD constraint
      # `spec.template.spec.minProperties >= 1` when no tuning knob is
      # overridden.
      format: cloud-config
      # Substrate-required `kubeletExtraArgs` baseline (same rationale
      # as KubeadmControlPlaneTemplate): `KubeletInUserNamespace=true`
      # tells kubelet to ignore oomWatcher init failure under
      # unprivileged userns where /dev/kmsg open is not permitted.
      # Without it kubelet enters Restart=always crash loop on every
      # CAPN-spawned worker. Consumer extras append after baseline.
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: feature-gates
              value: "KubeletInUserNamespace=true"
            {{- with $w.kubeletExtraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with $w.preKubeadmCommands }}
      preKubeadmCommands:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $w.postKubeadmCommands }}
      postKubeadmCommands:
        {{- toYaml . | nindent 8 }}
      {{- end }}
