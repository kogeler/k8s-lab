---
# Molecule scenario for the lxd_host role.
#
# Driver: delegated — the shared Vagrant/libvirt VM under
# tests/vagrant/debian13 is the single managed host across scenarios
# (plan §9.1). VM lifecycle is owned by scripts/molecule_run.py; this
# scenario runs prepare → converge → idempotence → verify against it.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../ansible/requirements.yml

driver:
  # Molecule 26.x merged the old `delegated` driver into `default` with
  # `options.managed: false`. VM is brought up by molecule_run.py before
  # molecule itself is invoked — create/destroy phases are no-ops here.
  name: default
  options:
    managed: false

platforms:
  - name: k8slab-host
    groups:
      - k8slab_host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      # community.general 12.0 removed the yaml stdout callback.
      stdout_callback: ansible.builtin.default
      result_format: yaml
      forks: 5
      callbacks_enabled: ansible.posix.profile_tasks
    ssh_connection:
      pipelining: true
  inventory:
    host_vars:
      k8slab-host:
        _shared_target_role: lxd_host
        # Required override: uplink defaults to "" to prevent accidental
        # bridging of mgmt NICs. In the test VM guest, NIC order is:
        #   eth0 — vagrant-libvirt mgmt (SSH)
        #   eth1 — k8slab-mgmt-nat (second IPv4 NAT; unused by role)
        #   eth2 — k8slab-ext6-mock (IPv6 external segment — our uplink)
        lxd_host_ext_bridge_uplink: "eth2"
        # Connection coordinates from scripts/molecule_run.py env vars.
        ansible_host:                 "{{ lookup('env', 'K8SLAB_HOST_ADDR') }}"
        ansible_user:                 "{{ lookup('env', 'K8SLAB_HOST_USER') }}"
        ansible_port:                 "{{ lookup('env', 'K8SLAB_HOST_PORT') | int }}"
        ansible_ssh_private_key_file: "{{ lookup('env', 'K8SLAB_HOST_KEY') }}"
        ansible_ssh_common_args:      "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  playbooks:
    prepare:  prepare.yml
    converge: ${MOLECULE_PROJECT_DIRECTORY}/shared/converge.yml
    verify:   verify.yml

scenario:
  name: lxd_host
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
