---
# bootstrap_clusterctl scenario prepare.
#
# Pulls shared base + clean-disk (the LXD substrate meta-dep chain
# hands btrfs a signature-free disk on first converge).

- name: "Prepare | bootstrap_clusterctl"
  hosts: all
  gather_facts: true
  become: true
  vars:
    _molecule_project_dir: "{{ lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') }}"
  tasks:
    - name: "Prepare | bootstrap_clusterctl | shared base"
      ansible.builtin.include_tasks:
        file: "{{ _molecule_project_dir }}/shared/tasks/prepare.yml"

    - name: "Prepare | bootstrap_clusterctl | clean pool disk"
      ansible.builtin.include_tasks:
        file: "{{ _molecule_project_dir }}/shared/tasks/prepare-clean-disk.yml"
