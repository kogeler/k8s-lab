---
- name: "Converge | e2e-local | bootstrap substrate and install charts"
  hosts: all
  gather_facts: true
  become: true
  vars:
    _repo_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | dirname | dirname }}"
    _artifacts_root: "{{ _repo_root }}/.artifacts"
    _bootstrap_kubeconfig: "{{ _artifacts_root }}/bootstrap.kubeconfig"
    _cluster_class_chart: "{{ _repo_root }}/charts/capi-cluster-class"
    _workload_chart: "{{ _repo_root }}/charts/capi-workload-cluster"
    _cni_calico_chart: "{{ _repo_root }}/charts/cni-calico"
    _metallb_chart: "{{ _repo_root }}/charts/metallb"
    _metallb_config_chart: "{{ _repo_root }}/charts/metallb-config"
    _metallb_namespace: "metallb-system"
    _workload_namespace: "capi-clusters"
    _cluster_class_namespace: "capi-system"
    _workload_cluster_name: "{{ k8s_lab_workload_cluster_name }}"
    _workload_kubeconfig: "{{ _artifacts_root }}/clusters/{{ _workload_cluster_name }}.kubeconfig"
    _kubernetes_version: "{{ k8s_lab_kubernetes_version }}"
    _infrastructure_secret_name: "{{ k8s_lab_infrastructure_secret_name | default('incus-identity') }}"
    _lxd_host_address: "{{ lookup('env', 'K8SLAB_HOST_ADDR') }}"
  tasks:
    - name: "Converge | e2e-local | build bootstrap management cluster + artifacts"
      ansible.builtin.include_role:
        name: export_artifacts

    - name: "Converge | e2e-local | install ClusterClass chart"
      kubernetes.core.helm:
        kubeconfig: "{{ _bootstrap_kubeconfig }}"
        name: capi-cluster-class
        chart_ref: "{{ _cluster_class_chart }}"
        release_namespace: "{{ _cluster_class_namespace }}"
        create_namespace: false
        wait: true
        wait_timeout: 5m
        values:
          kubernetes:
            version: "{{ _kubernetes_version }}"
          capn:
            infrastructureSecretName: "{{ _infrastructure_secret_name }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    # `helm install` waits for the chart's post-install hook Job
    # (`api-proxy-attach`) to succeed before returning, so on
    # success the LXD `proxy` device is already wired on the
    # haproxy LB instance and `<lxd_host>:<api-proxy-port>` is
    # ready to forward to workload kube-apiserver.
    # `wait_timeout` covers (CAPN provisions LB instance) + (hook
    # Job patches LXD config) — 15 minutes is comfortable on a
    # cold lab host.
    - name: "Converge | e2e-local | install workload Cluster chart"
      kubernetes.core.helm:
        kubeconfig: "{{ _bootstrap_kubeconfig }}"
        name: "{{ _workload_cluster_name }}"
        chart_ref: "{{ _workload_chart }}"
        release_namespace: "{{ _workload_namespace }}"
        create_namespace: false
        wait: true
        wait_timeout: 15m
        values:
          cluster:
            name: "{{ _workload_cluster_name }}"
          clusterClass:
            namespace: "{{ _cluster_class_namespace }}"
          kubernetes:
            version: "{{ _kubernetes_version }}"
          apiProxy:
            infrastructureSecretName: "{{ _infrastructure_secret_name }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    # ---- Runner-reachable workload kubeconfig -----------------------
    # The kubeconfig CAPN mints in the `<cluster>-kubeconfig` Secret
    # points at the in-cluster CP VIP (LXD-bridge IPv6, runner-
    # unreachable). Rewrite the server URL to
    # `https://<vagrant-vm>:<port>` (where <port> comes from the
    # Cluster CR annotation `k8s-lab.io/api-proxy-port` written by
    # `capi-workload-cluster`) and inject
    # `tls-server-name: kubernetes.default.svc` to bypass the SAN
    # mismatch the rewrite introduces. Every add-on chart below
    # installs from the runner against this rewritten kubeconfig.

    - name: "Converge | e2e-local | wait for workload kubeconfig Secret on bootstrap"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _bootstrap_kubeconfig }}"
        api_version: v1
        kind: Secret
        namespace: "{{ _workload_namespace }}"
        name: "{{ _workload_cluster_name }}-kubeconfig"
      register: _converge_wl_kc_secret
      until: >-
        (_converge_wl_kc_secret.resources | length) == 1
        and ((_converge_wl_kc_secret.resources[0].data.value | default('')) | length) > 0
      retries: 60
      delay: 10
      delegate_to: localhost
      become: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Converge | e2e-local | read api-proxy-port annotation from Cluster CR"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _bootstrap_kubeconfig }}"
        api_version: cluster.x-k8s.io/v1beta2
        kind: Cluster
        namespace: "{{ _workload_namespace }}"
        name: "{{ _workload_cluster_name }}"
      register: _converge_wl_cluster
      delegate_to: localhost
      become: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Converge | e2e-local | bind api proxy port"
      ansible.builtin.set_fact:
        _api_proxy_port: >-
          {{ _converge_wl_cluster.resources[0].metadata.annotations['k8s-lab.io/api-proxy-port'] }}

    - name: "Converge | e2e-local | ensure runner-side clusters/ dir exists"
      ansible.builtin.file:
        path: "{{ _workload_kubeconfig | dirname }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: "Converge | e2e-local | rewrite + write runner-reachable workload kubeconfig"
      ansible.builtin.copy:
        dest: "{{ _workload_kubeconfig }}"
        content: |
          {{ _converge_wl_kc_secret.resources[0].data.value
             | b64decode
             | regex_replace('server: https://[^\n]+',
                             'server: https://' ~ _lxd_host_address ~ ':' ~ _api_proxy_port ~ '\n    tls-server-name: kubernetes.default.svc') }}
        mode: "0600"
      delegate_to: localhost
      become: false

    # Workload kube-apiserver may be momentarily unreachable while
    # CAPI is mid-rollout (KCP rotating CP machines, kubeadm join
    # still in progress). A fresh `helm install cni-calico` would
    # then fail with `Kubernetes cluster unreachable: connection
    # refused`. Poll /livez through the runner-reachable endpoint
    # until 200 before proceeding.
    - name: "Converge | e2e-local | wait for workload kube-apiserver /livez (runner-side)"
      ansible.builtin.uri:
        url: "https://{{ _lxd_host_address }}:{{ _api_proxy_port }}/livez"
        method: GET
        validate_certs: false
        status_code: [200, 401]
        timeout: 10
      register: _converge_apiserver_probe
      retries: 60
      delay: 10
      until: _converge_apiserver_probe.status in [200, 401]
      delegate_to: localhost
      become: false

    # ---- Cluster add-ons (CNI + MetalLB) ----------------------------
    # The runner now holds a kubeconfig pointing at a runner-reachable
    # endpoint, so every workload-cluster add-on installs from the
    # runner via `kubernetes.core.helm` with `delegate_to: localhost`.
    # `dependency_update: true` is set on charts whose Chart.yaml has
    # a `dependencies:` block — Helm refreshes the subchart cache
    # from the upstream registry on first run.

    - name: "Converge | e2e-local | install CNI Calico on workload cluster"
      kubernetes.core.helm:
        kubeconfig: "{{ _workload_kubeconfig }}"
        name: cni-calico
        chart_ref: "{{ _cni_calico_chart }}"
        release_namespace: tigera-operator
        create_namespace: true
        dependency_update: true
        wait: true
        wait_timeout: 10m
        values:
          calico:
            pods:
              cidrBlocks:
                - "{{ k8s_lab_workload_pod_cidr_v4 }}"
                - "{{ k8s_lab_workload_pod_cidr_v6 }}"
          tests:
            kubectlVersion: "{{ _kubernetes_version }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    # ---- MetalLB delivery (two-release pair, PLAN §17.1) ------------
    #   1) charts/metallb/         — upstream subchart wrapper
    #      (CRDs + controller + speaker). Installed first so the
    #      metallb.io/v1beta1 API is registered by the time the
    #      sibling chart's CRs are validated by Helm.
    #   2) charts/metallb-config/  — IPAddressPool + L2Advertisement
    #      + helm test driver Pod (Gate A acceptance).
    # Splitting them avoids Helm 3's pre-apply manifest validation
    # failing on `no matches for kind IPAddressPool` when CRDs and
    # CRs ship in the same release (the upstream subchart puts CRDs
    # in `templates/crds/` rather than the Helm `crds/` folder).

    - name: "Converge | e2e-local | install upstream MetalLB on workload cluster"
      kubernetes.core.helm:
        kubeconfig: "{{ _workload_kubeconfig }}"
        name: metallb
        chart_ref: "{{ _metallb_chart }}"
        release_namespace: "{{ _metallb_namespace }}"
        create_namespace: true
        dependency_update: true
        wait: true
        wait_timeout: 10m
      delegate_to: localhost
      become: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Converge | e2e-local | install MetalLB config on workload cluster"
      kubernetes.core.helm:
        kubeconfig: "{{ _workload_kubeconfig }}"
        name: metallb-config
        chart_ref: "{{ _metallb_config_chart }}"
        release_namespace: "{{ _metallb_namespace }}"
        create_namespace: false
        wait: true
        wait_timeout: 10m
        values:
          pool:
            rangeV6: "{{ k8s_lab_metallb_vip_range_v6 }}"
          l2:
            interface: "{{ k8s_lab_metallb_interface | default('eth1') }}"
          tests:
            kubectlVersion: "{{ _kubernetes_version }}"
      delegate_to: localhost
      become: false
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
