---
# e2e-local verify — final acceptance after the canonical bootstrap →
# pivot → workload flow (PLAN §10.2 / §16 / §18).
#
# At this point converge has finished:
#   * `.artifacts/mgmt.kubeconfig`  → self-hosted mgmt-1 kube-apiserver
#   * `.artifacts/clusters/{mgmt-1,lab-default}.kubeconfig` → debug copies
#   * mgmt-1 helm tests (Gate A/B) already passed inside converge
#     before pivot — we don't repeat them here
#
# This play asserts the workload cluster is healthy end-to-end:
#   1) helm test capi-workload-cluster (chart-side cluster-ready hook)
#   2) helm test cni-calico            (Gate B on workload)
#   3) helm test metallb-config        (Gate A in-cluster on workload)
#   4) external HTTP GET to MetalLB VIP from the VM (Gate A out-of-cluster
#      proof through `ext6-ra-peer`)
#   5) workload Nodes Ready=True via the runner-reachable kubeconfig
#   6) CAPI snapshot via the now-self-hosted mgmt-1 kubeconfig

- name: "Verify | e2e-local | workload helm tests + Gate A external + Nodes Ready"
  hosts: all
  gather_facts: false
  become: false
  vars:
    _repo_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | dirname | dirname }}"
    _artifacts_root: "{{ _repo_root }}/.artifacts"
    _clusters_dir: "{{ _artifacts_root }}/clusters"

    # mgmt.kubeconfig now points at self-hosted mgmt-1 (overwritten in
    # converge Phase C by the second export_artifacts include with
    # run_meta_chain=false).
    _mgmt_kubeconfig: "{{ _artifacts_root }}/mgmt.kubeconfig"

    _capi_namespace: "capi-clusters"
    _metallb_namespace: "metallb-system"
    _tigera_namespace: "tigera-operator"

    _workload_cluster_name: "{{ k8s_lab_workload_cluster_name | default('lab-default') }}"
    _workload_kubeconfig: "{{ _clusters_dir }}/{{ _workload_cluster_name }}.kubeconfig"

    # MetalLB chart-side test deploys this Service and leaves it running
    # for verify-side curl (hook-delete-policy: before-hook-creation).
    _metallb_demo_service: "k8s-lab-metallb-demo"
    _metallb_demo_port: 80

    _capi_kinds:
      - { api_version: "cluster.x-k8s.io/v1beta2", kind: "Cluster" }
      - { api_version: "controlplane.cluster.x-k8s.io/v1beta2", kind: "KubeadmControlPlane" }
      - { api_version: "cluster.x-k8s.io/v1beta2", kind: "MachineDeployment" }
      - { api_version: "cluster.x-k8s.io/v1beta2", kind: "Machine" }
      - { api_version: "infrastructure.cluster.x-k8s.io/v1alpha2", kind: "LXCCluster" }
      - { api_version: "infrastructure.cluster.x-k8s.io/v1alpha2", kind: "LXCMachine" }
  tasks:
    # ---- workload chart helm tests (Gate A in-cluster + Gate B + cluster-ready)
    # `helm test` has no equivalent in kubernetes.core; this is the only
    # shell fallback. Each chart's own
    # `before-hook-creation,hook-succeeded` policy makes re-runs
    # idempotent (prior test pod is deleted on the next invocation).
    - name: "Verify | e2e-local | workload | helm test capi-workload-cluster"
      ansible.builtin.command:
        argv:
          - helm
          - test
          - "{{ _workload_cluster_name }}"
          - --namespace
          - "{{ _capi_namespace }}"
          - --kubeconfig
          - "{{ _mgmt_kubeconfig }}"
          - --logs
          - --timeout
          - 35m
      delegate_to: localhost
      register: _helm_test

    - name: "Verify | e2e-local | workload | helm test cni-calico (Gate B)"
      ansible.builtin.command:
        argv:
          - helm
          - test
          - cni-calico
          - --namespace
          - "{{ _tigera_namespace }}"
          - --kubeconfig
          - "{{ _workload_kubeconfig }}"
          - --logs
          - --timeout
          - 15m
      delegate_to: localhost
      register: _cni_helm_test

    - name: "Verify | e2e-local | workload | helm test metallb-config (Gate A in-cluster)"
      ansible.builtin.command:
        argv:
          - helm
          - test
          - metallb-config
          - --namespace
          - "{{ _metallb_namespace }}"
          - --kubeconfig
          - "{{ _workload_kubeconfig }}"
          - --logs
          - --timeout
          - 15m
      delegate_to: localhost
      register: _metallb_helm_test

    # ---- Gate A external-segment closure ------------------------------------
    # The chart-side hook left the demo Deployment + Service running.
    # Read the VIP from the workload cluster (runner-side) and drive an
    # HTTP GET from the VM (no `delegate_to: localhost`) so the packet
    # egresses through `ext6-ra-peer` (2001:db8:42:100::1) → veth →
    # `br-ext6` → eth1 of the speaker leader → kube-proxy → backend Pod.
    - name: "Verify | e2e-local | read MetalLB demo Service VIP"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _workload_kubeconfig }}"
        api_version: v1
        kind: Service
        namespace: "{{ _metallb_namespace }}"
        name: "{{ _metallb_demo_service }}"
      register: _metallb_demo_svc
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Verify | e2e-local | assert MetalLB allocated a VIP"
      ansible.builtin.assert:
        that:
          - (_metallb_demo_svc.resources | length) == 1
          - (_metallb_demo_svc.resources[0].status.loadBalancer.ingress | default([])) | length > 0
          - "':' in (_metallb_demo_svc.resources[0].status.loadBalancer.ingress[0].ip | default(''))"
        fail_msg: >-
          MetalLB demo Service did not surface a VIP in
          `status.loadBalancer.ingress[0].ip` (status: {{ (_metallb_demo_svc.resources | first | default({})).status | default('<no-svc>') }}).

    - name: "Verify | e2e-local | bind MetalLB demo VIP fact"
      ansible.builtin.set_fact:
        _metallb_demo_vip: "{{ _metallb_demo_svc.resources[0].status.loadBalancer.ingress[0].ip }}"

    - name: "Verify | e2e-local | external HTTP GET to MetalLB VIP from VM"
      ansible.builtin.uri:
        url: "http://[{{ _metallb_demo_vip }}]:{{ _metallb_demo_port }}/"
        method: GET
        return_content: true
        status_code: 200
        timeout: 15
      register: _metallb_external_curl
      retries: 6
      delay: 5
      until: _metallb_external_curl.status == 200

    - name: "Verify | e2e-local | assert external GET body is 'ok'"
      ansible.builtin.assert:
        that:
          - (_metallb_external_curl.content | default('')) is search('^ok')
        fail_msg: >-
          External HTTP GET to http://[{{ _metallb_demo_vip }}]:{{ _metallb_demo_port }}/
          succeeded but returned unexpected body:
          {{ _metallb_external_curl.content | default('<none>') }}

    # ---- workload Nodes Ready via runner-reachable kubeconfig ---------------
    - name: "Verify | e2e-local | workload | runner-side Nodes via rewritten kubeconfig"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _workload_kubeconfig }}"
        api_version: v1
        kind: Node
      register: _wl_nodes_runner
      retries: 12
      delay: 5
      until: >-
        (_wl_nodes_runner.resources | default([])) | length ==
        ((k8s_lab_workload_controlplane_count | int) +
         (k8s_lab_workload_worker_count | int))
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Verify | e2e-local | workload | assert all Nodes Ready=True"
      ansible.builtin.assert:
        that:
          - (_wl_nodes_runner.resources | length) ==
            ((k8s_lab_workload_controlplane_count | int) +
             (k8s_lab_workload_worker_count | int))
          - (_wl_nodes_runner.resources
              | map(attribute='status.conditions')
              | map('selectattr', 'type', 'eq', 'Ready')
              | map('first')
              | map(attribute='status')
              | unique
              | list) == ['True']
        fail_msg: >-
          Runner-side Node check via {{ _workload_kubeconfig }} failed.
          Got {{ _wl_nodes_runner.resources | length }} Nodes, conditions:
          {{ _wl_nodes_runner.resources
             | map(attribute='status.conditions')
             | map('selectattr', 'type', 'eq', 'Ready')
             | map('first') | list }}

    # ---- self-hosted mgmt-1 CAPI snapshot ----------------------------------
    # mgmt.kubeconfig points at mgmt-1 post-pivot. Snapshot CAPI CRs to
    # confirm pivot landed cleanly + workload Cluster CR is reconciled
    # against mgmt-1's CAPI controllers (not bootstrap's — bootstrap is
    # gone).
    - name: "Verify | e2e-local | mgmt-1 | snapshot CAPI objects"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _mgmt_kubeconfig }}"
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        namespace: "{{ _capi_namespace }}"
      loop: "{{ _capi_kinds }}"
      loop_control:
        label: "{{ item.kind }}"
      register: _capi_snapshot
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Verify | e2e-local | print compact state"
      ansible.builtin.debug:
        msg:
          - "{{ _helm_test.stdout_lines | default([]) }}"
          - "{{ _cni_helm_test.stdout_lines | default([]) }}"
          - "{{ _metallb_helm_test.stdout_lines | default([]) }}"
          - "metallb VIP={{ _metallb_demo_vip | default('<unread>') }} external_status={{ _metallb_external_curl.status | default('<none>') }}"
          - "workload kubeconfig = {{ _workload_kubeconfig }} ({{ _wl_nodes_runner.resources | default([]) | length }} Nodes Ready)"
          - >-
            {{ _capi_snapshot.results
               | map(attribute='resources')
               | map('default', [])
               | map('map', attribute='metadata.name')
               | map('list')
               | list }}
