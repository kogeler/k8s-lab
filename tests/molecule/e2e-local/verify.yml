---
- name: "Verify | e2e-local | workload cluster Helm hook"
  hosts: all
  gather_facts: false
  become: false
  vars:
    _repo_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | dirname | dirname }}"
    _artifacts_root: "{{ _repo_root }}/.artifacts"
    _bootstrap_kubeconfig: "{{ _artifacts_root }}/bootstrap.kubeconfig"
    _workload_namespace: "capi-clusters"
    _workload_cluster_name: "{{ k8s_lab_workload_cluster_name }}"
    # Runner-reachable kubeconfig minted by converge.yml after
    # capi-workload-cluster's post-install hook attaches the LXD
    # `proxy` device on the haproxy LB. Every helm test below talks
    # to the workload API through this rewritten endpoint.
    _workload_kubeconfig: "{{ _artifacts_root }}/clusters/{{ _workload_cluster_name }}.kubeconfig"
    _kubernetes_version: "{{ k8s_lab_kubernetes_version }}"
    _metallb_namespace: "metallb-system"
    # MetalLB chart-side helm test deploys a demo Deployment +
    # LoadBalancer Service named after `tests.demoName` in values.yaml;
    # we read that Service's allocated VIP and drive an external curl
    # against it from the VM through `ext6-ra-peer` to close Gate A.
    _metallb_demo_service: "k8s-lab-metallb-demo"
    _metallb_demo_port: 80
    _capi_kinds:
      - { api_version: "cluster.x-k8s.io/v1beta2", kind: "Cluster" }
      - { api_version: "controlplane.cluster.x-k8s.io/v1beta2", kind: "KubeadmControlPlane" }
      - { api_version: "cluster.x-k8s.io/v1beta2", kind: "MachineDeployment" }
      - { api_version: "cluster.x-k8s.io/v1beta2", kind: "Machine" }
      - { api_version: "infrastructure.cluster.x-k8s.io/v1alpha2", kind: "LXCCluster" }
      - { api_version: "infrastructure.cluster.x-k8s.io/v1alpha2", kind: "LXCMachine" }
  tasks:
    # `helm test` has no equivalent in kubernetes.core; this is the
    # only shell fallback in this play. Each chart's own
    # `before-hook-creation,hook-succeeded` policy makes re-runs
    # idempotent (prior test pod is deleted on the next invocation),
    # so we don't add a synthetic pre-check; we just don't mask the
    # `changed: true` the run rightly emits. All `helm test` calls
    # run on the runner — the workload API is runner-reachable
    # through the rewritten kubeconfig.

    - name: "Verify | e2e-local | run workload chart helm test"
      ansible.builtin.command:
        argv:
          - helm
          - test
          - "{{ _workload_cluster_name }}"
          - --namespace
          - "{{ _workload_namespace }}"
          - --kubeconfig
          - "{{ _bootstrap_kubeconfig }}"
          - --logs
          - --timeout
          - 35m
      delegate_to: localhost
      register: _helm_test

    - name: "Verify | e2e-local | run cni-calico helm test"
      ansible.builtin.command:
        argv:
          - helm
          - test
          - cni-calico
          - --namespace
          - tigera-operator
          - --kubeconfig
          - "{{ _workload_kubeconfig }}"
          - --logs
          - --timeout
          - 15m
      delegate_to: localhost
      register: _cni_helm_test

    # ---- MetalLB chart-side acceptance ------------------------------
    # In-cluster proof: controller Available, speaker DS rolled out,
    # demo LoadBalancer Service got a VIP from the v6 pool, backend
    # serves on it from inside the cluster (driver Pod's kubectl exec
    # probe). The verify-side curl below closes Gate A by hitting the
    # same VIP from outside the cluster (VM `ext6-ra-peer`).
    - name: "Verify | e2e-local | run metallb-config helm test"
      ansible.builtin.command:
        argv:
          - helm
          - test
          - metallb-config
          - --namespace
          - "{{ _metallb_namespace }}"
          - --kubeconfig
          - "{{ _workload_kubeconfig }}"
          - --logs
          - --timeout
          - 15m
      delegate_to: localhost
      register: _metallb_helm_test

    # ---- Gate A external-segment closure ----------------------------
    # The chart-side hook left the demo Deployment + Service running
    # (`hook-delete-policy: before-hook-creation` only). Read the VIP
    # from the workload cluster (runner-side via rewritten kubeconfig)
    # and drive an HTTP GET against it from the VM. The curl runs on
    # the VM (no `delegate_to: localhost`) so the packet egresses
    # through `ext6-ra-peer` (2001:db8:42:100::1) → veth → `br-ext6`
    # → eth1 of the speaker leader → kube-proxy → backend Pod.
    # Round-trip 200 + body "ok\n" == Gate A green.
    - name: "Verify | e2e-local | read MetalLB demo Service VIP"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _workload_kubeconfig }}"
        api_version: v1
        kind: Service
        namespace: "{{ _metallb_namespace }}"
        name: "{{ _metallb_demo_service }}"
      register: _metallb_demo_svc
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Verify | e2e-local | assert MetalLB allocated a VIP"
      ansible.builtin.assert:
        that:
          - (_metallb_demo_svc.resources | length) == 1
          - (_metallb_demo_svc.resources[0].status.loadBalancer.ingress | default([])) | length > 0
          - "':' in (_metallb_demo_svc.resources[0].status.loadBalancer.ingress[0].ip | default(''))"
        fail_msg: >-
          MetalLB demo Service did not surface a VIP in
          `status.loadBalancer.ingress[0].ip` (status: {{ (_metallb_demo_svc.resources | first | default({})).status | default('<no-svc>') }}).

    - name: "Verify | e2e-local | bind MetalLB demo VIP fact"
      ansible.builtin.set_fact:
        _metallb_demo_vip: "{{ _metallb_demo_svc.resources[0].status.loadBalancer.ingress[0].ip }}"

    # IPv6 literal HTTP URL — RFC 3986 brackets. ansible.builtin.uri
    # honours [..]. busybox-side wget on the VM is also available as a
    # fallback if uri's urllib3 stack ever balks at IPv6, but uri stays
    # native and produces structured output.
    - name: "Verify | e2e-local | external HTTP GET to MetalLB VIP from VM"
      ansible.builtin.uri:
        url: "http://[{{ _metallb_demo_vip }}]:{{ _metallb_demo_port }}/"
        method: GET
        return_content: true
        status_code: 200
        timeout: 15
      register: _metallb_external_curl
      retries: 6
      delay: 5
      until: _metallb_external_curl.status == 200

    - name: "Verify | e2e-local | assert external GET body is 'ok'"
      ansible.builtin.assert:
        that:
          - (_metallb_external_curl.content | default('')) is search('^ok')
        fail_msg: >-
          External HTTP GET to http://[{{ _metallb_demo_vip }}]:{{ _metallb_demo_port }}/
          succeeded but returned unexpected body:
          {{ _metallb_external_curl.content | default('<none>') }}

    - name: "Verify | e2e-local | snapshot bootstrap-side CAPI objects"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _bootstrap_kubeconfig }}"
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        namespace: "{{ _workload_namespace }}"
      loop: "{{ _capi_kinds }}"
      loop_control:
        label: "{{ item.kind }}"
      register: _capi_snapshot
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    # ---- Runner-reachable nodes-ready acceptance --------------------
    # converge.yml already wrote the rewritten kubeconfig to
    # `.artifacts/clusters/<cluster>.kubeconfig`. Re-query workload
    # Nodes through it and assert all are Ready=True. This proves the
    # full path runner → libvirt → VM:<api-proxy-port> → LXD proxy
    # device → haproxy LB → CP backend → kube-apiserver works end-to-
    # end. CNI is in by now (helm test cni-calico above), so Ready=True
    # is the right bar.
    - name: "Verify | e2e-local | runner-side workload Nodes through rewritten kubeconfig"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _workload_kubeconfig }}"
        api_version: v1
        kind: Node
      register: _wl_nodes_runner
      retries: 12
      delay: 5
      until: >-
        (_wl_nodes_runner.resources | default([])) | length ==
        ((k8s_lab_workload_controlplane_count | int) +
         (k8s_lab_workload_worker_count | int))
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

    - name: "Verify | e2e-local | assert all workload Nodes Ready=True (runner-side)"
      ansible.builtin.assert:
        that:
          - (_wl_nodes_runner.resources | length) ==
            ((k8s_lab_workload_controlplane_count | int) +
             (k8s_lab_workload_worker_count | int))
          - (_wl_nodes_runner.resources
              | map(attribute='status.conditions')
              | map('selectattr', 'type', 'eq', 'Ready')
              | map('first')
              | map(attribute='status')
              | unique
              | list) == ['True']
        fail_msg: >-
          Runner-side Node check via {{ _workload_kubeconfig }} failed.
          Got {{ _wl_nodes_runner.resources | length }} Nodes, conditions:
          {{ _wl_nodes_runner.resources
             | map(attribute='status.conditions')
             | map('selectattr', 'type', 'eq', 'Ready')
             | map('first') | list }}

    - name: "Verify | e2e-local | print compact state"
      ansible.builtin.debug:
        msg:
          - "{{ _helm_test.stdout_lines | default([]) }}"
          - "{{ _cni_helm_test.stdout_lines | default([]) }}"
          - "{{ _metallb_helm_test.stdout_lines | default([]) }}"
          - "metallb VIP={{ _metallb_demo_vip | default('<unread>') }} external_status={{ _metallb_external_curl.status | default('<none>') }}"
          - "workload kubeconfig = {{ _workload_kubeconfig }} ({{ _wl_nodes_runner.resources | default([]) | length }} Nodes Ready)"
          - >-
            {{ _capi_snapshot.results
               | map(attribute='resources')
               | map('default', [])
               | map('map', attribute='metadata.name')
               | map('list')
               | list }}
