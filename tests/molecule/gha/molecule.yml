---
# CI-only Molecule scenario — full e2e on a GitHub Actions ubuntu-latest
# runner (no Vagrant, no nested virtualisation).
#
# Mirrors `e2e-local` in structure: `driver: default managed: false` plus
# one virtual platform `k8slab-host`. The substantive difference is in
# `host_vars/k8slab-host.yml`, which pins `ansible_connection: local`
# (the runner IS the target host) and overrides the substrate facts that
# only make sense in the Vagrant harness (`base_system_btrfs_pool_required:
# false`, etc.).
#
# `converge.yml` and `verify.yml` `import_playbook:` the e2e-local
# equivalents verbatim — the canonical bootstrap → pivot → workload flow
# stays in a single source of truth. `prepare.yml` is where this scenario
# diverges: GHA-runner-specific bootstrap (Docker cleanup, swapoff,
# loopback btrfs pool, /mnt-relocation of LXD storage) before the shared
# prepare hooks (apt deps, ext6-ra source, …).
#
# Local execution of this scenario is forbidden — the playbook's first
# task asserts `$GITHUB_ACTIONS == 'true'`, and the Makefile gha-local-*
# targets refuse to run without it.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../ansible/requirements.yml

driver:
  name: default
  options:
    managed: false

platforms:
  - name: k8slab-host
    groups:
      - k8slab_host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: ansible.builtin.default
      result_format: yaml
      forks: 5
      callbacks_enabled: ansible.posix.profile_tasks
  inventory:
    links:
      group_vars: ../shared/inventory/group_vars
      host_vars:  host_vars
  playbooks:
    prepare:  prepare.yml
    converge: converge.yml
    verify:   verify.yml

scenario:
  name: gha
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - verify
    - destroy

verifier:
  name: ansible
