---
# Shared prepare steps for Molecule scenarios.
#
# Scenarios include this file to get test-harness prerequisites without
# duplicating boilerplate. Keep it lean — anything role-specific belongs in
# the scenario's own prepare.yml.

- name: "Prepare | shared | update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "Prepare | shared | install minimum test dependencies"
  ansible.builtin.apt:
    name:
      - python3
      - python3-apt
      - ca-certificates
      - iproute2
      - rsync
      # python3-kubernetes is the controller-side Python dep
      # kubernetes.core needs (k8s + k8s_info modules import the
      # `kubernetes` package directly). The Vagrant VM IS the
      # Ansible target for these modules, so we install it here
      # rather than on the dev box's venv.
      - python3-kubernetes
    state: present

- name: "Prepare | shared | ensure /opt/capi-lab root exists"
  # base_system normally owns this; we pre-create it for scenarios that
  # apply a role other than base_system in isolation.
  ansible.builtin.file:
    path: /opt/capi-lab
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Prepare | shared | in-VM external IPv6 RA source (veth + radvd)"
  # Substrate-required for the whole harness: shared host_vars set
  # `lxd_host_ext_bridge_uplink: ext6-ra`, which the `lxd_host` role
  # expects to be an actual bridge member at healthcheck time. This
  # task creates the veth pair (ext6-ra / ext6-ra-peer) and runs radvd
  # so containers attached to br-ext6 autoconfigure a global IPv6 via
  # SLAAC. Rationale lives in that file's header.
  ansible.builtin.include_tasks:
    file: "{{ lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') }}/shared/tasks/ext6-ra-source.yml"
