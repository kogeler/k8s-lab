---
# Shared Molecule converge entrypoint.
#
# The target role's name is derived from `MOLECULE_SCENARIO_NAME`
# (molecule sets this env var on every play invocation). Contract:
# each scenario's `scenario.name` in molecule.yml MUST equal the
# target role directory name under `ansible/roles/`. This single
# convention lets us drive every scenario through the same shared
# converge play without per-scenario `_shared_target_role` host_vars.
#
# Rationale: molecule's provisioner writes `inventory.host_vars` only
# when `inventory.links` is empty (provisioner/ansible.py:442 —
# all-or-nothing). Since shared substrate host_vars live in
# `shared/inventory/group_vars/k8slab_host.yml` via `inventory.links`,
# we cannot also smuggle scenario-local vars through
# `provisioner.inventory.host_vars.k8slab-host` in molecule.yml — it
# gets silently dropped. Scenario name via env var sidesteps the
# molecule limitation entirely.
#
# Integration-level scenarios (bootstrap_cluster, cluster_addons_helm,
# …) override `roles:` directly instead of using this shim.

- name: "Converge | shared | apply target role"
  hosts: all
  gather_facts: true
  become: true
  vars:
    _shared_target_role: "{{ lookup('env', 'MOLECULE_SCENARIO_NAME') }}"
  tasks:
    - name: "Converge | shared | guard scenario name available"
      ansible.builtin.assert:
        that:
          - _shared_target_role is string
          - _shared_target_role | length > 0
        fail_msg: >-
          MOLECULE_SCENARIO_NAME env var is empty. This playbook must
          run via `molecule <scenario>`, which populates the env
          (molecule sets it before exec'ing ansible-playbook).

    # Scenarios declare TRUE scenario-local overrides through a real
    # inventory file at `<scenario>/host_vars/k8slab-host.yml`
    # referenced from molecule.yml via `inventory.links.host_vars:
    # host_vars`. Ansible auto-loads those during this play. Overrides
    # in molecule.yml's `provisioner.inventory.host_vars.k8slab-host`
    # do NOT survive — see module docstring above.
    - name: "Converge | shared | apply role {{ _shared_target_role }}"
      ansible.builtin.include_role:
        name: "{{ _shared_target_role }}"
