---
# Molecule scenario for bootstrap_k3s.
#
# Driver: delegated — shared Vagrant/libvirt VM (plan §9.1). VM lifecycle
# is owned by scripts/molecule_run.py. The role pulls binary_fetch and
# lxd_bootstrap_instance transitively via meta-deps; no explicit role
# wiring lives in prepare.yml.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../ansible/requirements.yml

driver:
  name: default
  options:
    managed: false

platforms:
  - name: k8slab-host
    groups:
      - k8slab_host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: ansible.builtin.default
      result_format: yaml
      forks: 5
      callbacks_enabled: ansible.posix.profile_tasks
    ssh_connection:
      pipelining: true
  inventory:
    host_vars:
      k8slab-host:
        _shared_target_role: bootstrap_k3s
        # Required lxd_host override (meta-dep chain reaches down to it).
        lxd_host_ext_bridge_uplink: "eth2"
        # lxd_storage_pools needs the Vagrant-attached dedicated disk.
        lxd_storage_pools_pools:
          - name:        "capi-fast"
            driver:      "btrfs"
            description: "k8s-lab primary pool (btrfs on dedicated disk)"
            config:
              source:              "/dev/disk/by-id/virtio-k8slab-lxdpool"
              btrfs.mount_options: "user_subvol_rm_allowed"
        # First-run image pull is slow over a cold mirror.
        lxd_bootstrap_instance_wait_timeout: 300
        # k3s first-boot pulls the bundled images; bump the poll budget.
        bootstrap_k3s_wait_retries: 90
        bootstrap_k3s_wait_delay:   4
        ansible_host:                 "{{ lookup('env', 'K8SLAB_HOST_ADDR') }}"
        ansible_user:                 "{{ lookup('env', 'K8SLAB_HOST_USER') }}"
        ansible_port:                 "{{ lookup('env', 'K8SLAB_HOST_PORT') | int }}"
        ansible_ssh_private_key_file: "{{ lookup('env', 'K8SLAB_HOST_KEY') }}"
        ansible_ssh_common_args:      "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  playbooks:
    prepare:  prepare.yml
    converge: ${MOLECULE_PROJECT_DIRECTORY}/shared/converge.yml
    verify:   verify.yml

scenario:
  name: bootstrap_k3s
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
