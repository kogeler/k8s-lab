---
# lxd_profiles verify — real runtime checks (plan §9.4).

- name: "Verify | lxd_profiles"
  hosts: all
  gather_facts: true
  become: true
  vars:
    _socket_path: "/var/snap/lxd/common/lxd/unix.socket"
    _project:     "capi-lab"
    # Repo root derived from MOLECULE_PROJECT_DIRECTORY (= tests/molecule/).
    # Used to locate the lxd_profiles role's vendor-data template for
    # byte-for-byte comparison against live profile config.
    _repo_root: "{{ lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') | dirname | dirname }}"
    _vendor_data_template_path: "{{ _repo_root }}/ansible/roles/lxd_profiles/templates/capi-external-vendor-data.yaml.j2"
    # Profiles that MUST carry cloud-init.vendor-data (role §13.6 Step 9).
    # capi-base / capi-bootstrap have no external nic → no vendor-data.
    _expected_vendor_data_profiles:
      - "capi-controlplane"
      - "capi-worker"
    # Mirror the role's default contract here so verify asserts
    # against a known expected surface rather than whatever the role
    # happened to converge with.
    _expected_profiles:
      - name: "capi-base"
        description_must_contain: "base profile"
        required_devices:
          - {name: "root", type: "disk", pool: "capi-fast", path: "/"}
          - {name: "eth0", type: "nic", nictype: "bridged", parent: "capi-int"}
        required_config: {}
      - name: "capi-bootstrap"
        description_must_contain: "bootstrap"
        required_devices:
          - {name: "kmsg", type: "unix-char"}
        required_config:
          security.nesting:                     "true"
          security.privileged:                  "false"
          security.idmap.isolated:              "true"
          security.syscalls.intercept.mknod:    "true"
          security.syscalls.intercept.setxattr: "true"
          linux.kernel_modules:                 "br_netfilter,ip_vs,nf_conntrack,overlay"
          raw.lxc:                              "lxc.apparmor.profile=unconfined"
      - name: "capi-controlplane"
        description_must_contain: "control-plane"
        required_devices:
          - {name: "kmsg", type: "unix-char"}
          - {name: "eth1", type: "nic", nictype: "bridged", parent: "br-ext6"}
        required_config:
          security.nesting:                     "true"
          security.privileged:                  "false"
          security.idmap.isolated:              "true"
          security.syscalls.intercept.mknod:    "true"
          security.syscalls.intercept.setxattr: "true"
          linux.kernel_modules:                 "br_netfilter,ip_vs,nf_conntrack,overlay"
          raw.lxc:                              "lxc.apparmor.profile=unconfined"
      - name: "capi-worker"
        description_must_contain: "worker"
        required_devices:
          - {name: "kmsg", type: "unix-char"}
          - {name: "eth1", type: "nic", nictype: "bridged", parent: "br-ext6"}
        required_config:
          security.nesting:                     "true"
          security.privileged:                  "false"
          security.idmap.isolated:              "true"
          security.syscalls.intercept.mknod:    "true"
          security.syscalls.intercept.setxattr: "true"
          linux.kernel_modules:                 "br_netfilter,ip_vs,nf_conntrack,overlay"
          raw.lxc:                              "lxc.apparmor.profile=unconfined"
  tasks:
    # ---- Profile existence ------------------------------------------
    - name: "Verify | lxd_profiles | list profiles in capi-lab"
      ansible.builtin.uri:
        url:         "http://localhost/1.0/profiles?project={{ _project }}"
        unix_socket: "{{ _socket_path }}"
        method:      GET
        status_code: 200
        return_content: true
      register: _verify_list_register

    - name: "Verify | lxd_profiles | derive profile names"
      # LXD's /1.0/profiles?project=... returns URLs of the form
      # `/1.0/profiles/<name>?project=<project>`. `urlsplit('path')`
      # strips the query string; `basename` then takes the last path
      # component.
      ansible.builtin.set_fact:
        _verify_profile_names: >-
          {{
            (_verify_list_register.json.metadata | default([]))
            | map('urlsplit', 'path') | map('basename') | list
          }}

    - name: "Verify | lxd_profiles | assert every expected profile is present"
      ansible.builtin.assert:
        that:
          - item.name in _verify_profile_names
        fail_msg: >-
          expected profile "{{ item.name }}" missing from live list
          {{ _verify_profile_names }} (project {{ _project }}).
      loop: "{{ _expected_profiles }}"
      loop_control:
        label: "{{ item.name }}"

    # ---- Live state fetch ------------------------------------------
    - name: "Verify | lxd_profiles | fetch live state per profile"
      ansible.builtin.uri:
        url:         "http://localhost/1.0/profiles/{{ item.name }}?project={{ _project }}"
        unix_socket: "{{ _socket_path }}"
        method:      GET
        status_code: 200
        return_content: true
      loop: "{{ _expected_profiles }}"
      loop_control:
        label: "{{ item.name }}"
      register: _verify_show_register

    - name: "Verify | lxd_profiles | assert description contains expected token"
      ansible.builtin.assert:
        that:
          - item.item.description_must_contain in (item.json.metadata.description | default(''))
        fail_msg: >-
          profile "{{ item.item.name }}" description should contain
          "{{ item.item.description_must_contain }}" but LXD reports
          "{{ item.json.metadata.description | default('') }}".
      loop: "{{ _verify_show_register.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # Flatten (profile, key, value) triples for config assertions.
    - name: "Verify | lxd_profiles | build config triples"
      ansible.builtin.set_fact:
        _verify_config_triples: >-
          {{
            _verify_config_triples | default([])
            + (
              (item.item.required_config | default({})) | dict2items
              | map('combine', {'profile': item.item.name,
                                'live':    item.json.metadata.config | default({})})
              | list
            )
          }}
      loop: "{{ _verify_show_register.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: "Verify | lxd_profiles | assert required config keys match"
      ansible.builtin.assert:
        that:
          - (item.live.get(item.key) | string) == (item.value | string)
        fail_msg: >-
          profile "{{ item.profile }}" config key "{{ item.key }}"
          expected "{{ item.value }}" but LXD reports
          "{{ item.live.get(item.key) | default('<unset>') }}".
      loop: "{{ _verify_config_triples | default([]) }}"
      loop_control:
        label: "{{ item.profile }}:{{ item.key }}"

    # Flatten (profile, device_spec) pairs.
    - name: "Verify | lxd_profiles | build device pair list"
      ansible.builtin.set_fact:
        _verify_device_pairs: >-
          {{
            _verify_device_pairs | default([])
            + (
              (item.item.required_devices | default([]))
              | map('combine', {'profile':      item.item.name,
                                'live_devices': item.json.metadata.devices | default({})})
              | list
            )
          }}
      loop: "{{ _verify_show_register.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: "Verify | lxd_profiles | assert required device shape"
      ansible.builtin.assert:
        that:
          - item.name in (item.live_devices.keys() | list)
          - (item.live_devices[item.name].get('type', '')) == item.type
          - (item.type != 'disk') or ((item.live_devices[item.name].get('path', '')) == item.path)
          - (item.type != 'disk') or ((item.live_devices[item.name].get('pool', '')) == item.pool)
          - (item.type != 'nic')  or ((item.live_devices[item.name].get('nictype', '')) == item.nictype)
          - (item.type != 'nic')  or ((item.live_devices[item.name].get('parent', '')) == item.parent)
        fail_msg: >-
          profile "{{ item.profile }}" device "{{ item.name }}" missing
          or mismatched. desired={{ item }} live={{ item.live_devices[item.name] | default('<missing>') }}.
      loop: "{{ _verify_device_pairs | default([]) }}"
      loop_control:
        label: "{{ item.profile }}:{{ item.name }}"

    # ---- cloud-init.vendor-data (role §13.6 Step 9) ---------------------
    #
    # `capi-controlplane` and `capi-worker` ship a substrate-required
    # `cloud-init.vendor-data` rendered from the role's template. We
    # assert byte-for-byte equality against the same template rendered
    # with `_ifname=eth1` (scenario default) to prove the role did not
    # silently drop / mutate the value. Also assert that no stray
    # `cloud-init.user-data` slipped onto either profile, since CAPN
    # Machine templates rely on owning that slot exclusively.
    - name: "Verify | lxd_profiles | render expected external vendor-data"
      ansible.builtin.set_fact:
        _expected_vendor_data: "{{ lookup('ansible.builtin.template', _vendor_data_template_path) }}"
      vars:
        _ifname: "eth1"

    - name: "Verify | lxd_profiles | assert vendor-data byte-for-byte on flagged profiles"
      ansible.builtin.assert:
        that:
          - (item.json.metadata.config | default({})).get('cloud-init.vendor-data', '') == _expected_vendor_data
          - "'cloud-init.user-data' not in (item.json.metadata.config | default({}))"
        fail_msg: >-
          profile "{{ item.item.name }}" vendor-data drift or stray user-data.
          expected vendor-data (first 120 chars):
          "{{ _expected_vendor_data[:120] }}..."
          live vendor-data (first 120 chars):
          "{{ (item.json.metadata.config | default({})).get('cloud-init.vendor-data', '<unset>')[:120] }}..."
          live has cloud-init.user-data?
          {{ 'cloud-init.user-data' in (item.json.metadata.config | default({})) }}
      loop: "{{ _verify_show_register.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.item.name in _expected_vendor_data_profiles

    - name: "Verify | lxd_profiles | assert vendor-data ABSENT on non-flagged profiles"
      ansible.builtin.assert:
        that:
          - "'cloud-init.vendor-data' not in (item.json.metadata.config | default({}))"
          - "'cloud-init.user-data' not in (item.json.metadata.config | default({}))"
        fail_msg: >-
          profile "{{ item.item.name }}" unexpectedly has cloud-init
          config. This role only ships vendor-data on capi-controlplane
          and capi-worker.
      loop: "{{ _verify_show_register.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      when: item.item.name not in _expected_vendor_data_profiles
