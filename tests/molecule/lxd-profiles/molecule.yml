---
# Molecule scenario for the lxd_profiles role.
#
# Driver: delegated — shared Vagrant/libvirt VM (plan §9.1). VM lifecycle
# is owned by scripts/molecule_run.py.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../ansible/requirements.yml

driver:
  name: default
  options:
    managed: false

platforms:
  - name: k8slab-host
    groups:
      - k8slab_host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: ansible.builtin.default
      result_format: yaml
      forks: 5
      callbacks_enabled: ansible.posix.profile_tasks
    ssh_connection:
      pipelining: true
  inventory:
    host_vars:
      k8slab-host:
        _shared_target_role: lxd_profiles
        # Required lxd_host override (pulled in transitively).
        lxd_host_ext_bridge_uplink: "eth2"
        # lxd_storage_pools runs transitively — the test VM's dedicated
        # disk is the pool source. Required btrfs.mount_options is baked
        # into the role (vars/main.yml), so we only supply `source`.
        lxd_storage_pools_pools:
          - name:        "capi-fast"
            driver:      "btrfs"
            description: "k8s-lab primary pool (btrfs on dedicated disk)"
            config:
              source: "/dev/disk/by-id/virtio-k8slab-lxdpool"
        ansible_host:                 "{{ lookup('env', 'K8SLAB_HOST_ADDR') }}"
        ansible_user:                 "{{ lookup('env', 'K8SLAB_HOST_USER') }}"
        ansible_port:                 "{{ lookup('env', 'K8SLAB_HOST_PORT') | int }}"
        ansible_ssh_private_key_file: "{{ lookup('env', 'K8SLAB_HOST_KEY') }}"
        ansible_ssh_common_args:      "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  playbooks:
    prepare:  prepare.yml
    converge: ${MOLECULE_PROJECT_DIRECTORY}/shared/converge.yml
    verify:   verify.yml

scenario:
  name: lxd_profiles
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
