---
# bootstrap_capn_secret verify — plan §9.4 real-runtime assertions.
# Re-probes live state from the host independently of the role's own
# healthchecks. All Kubernetes reads go through kubernetes.core.k8s_info.
#
# Multi-namespace fanout (plan §13.11): the Secret is materialised in
# every namespace listed in `k8s_lab_capn_identity_namespaces`
# (shared group_vars default = ["capi-clusters"]). The verify
# scenario probes each.

- name: "Verify | bootstrap_capn_secret"
  hosts: all
  gather_facts: true
  become: true
  vars:
    _kubeconfig: "/opt/capi-lab/etc/bootstrap_clusterctl/bootstrap.kubeconfig"
    _socket:     "/var/snap/lxd/common/lxd/unix.socket"
    _project:    "{{ k8s_lab_project_name }}"
    _name:       "{{ k8s_lab_infrastructure_secret_name | default('incus-identity') }}"
    _namespaces: "{{ k8s_lab_capn_identity_namespaces }}"
  tasks:
    # ---- Live LXD daemon has HTTPS listener bound on internal-net IP ----
    - name: "Verify | bootstrap_capn_secret | read LXD daemon config"
      ansible.builtin.uri:
        url:         "http://localhost/1.0"
        unix_socket: "{{ _socket }}"
        method:      GET
        status_code: 200
        return_content: true
      register: _verify_daemon_register

    - name: "Verify | bootstrap_capn_secret | record live https_address"
      ansible.builtin.set_fact:
        _verify_https: >-
          {{ (_verify_daemon_register.json.metadata.config | default({}))['core.https_address'] | default('') }}

    - name: "Verify | bootstrap_capn_secret | assert HTTPS listener bound to internal-net IP"
      ansible.builtin.assert:
        that:
          - _verify_https | length > 0
          - _verify_https is search('^10\\.77\\.')
          - _verify_https is search(':8443$')
        fail_msg: >-
          core.https_address not bound on internal-net subnet:
          got "{{ _verify_https }}".

    # ---- LXD trust store has exactly one project-restricted entry ----
    - name: "Verify | bootstrap_capn_secret | list trust store"
      ansible.builtin.uri:
        url:         "http://localhost/1.0/certificates?recursion=1"
        unix_socket: "{{ _socket }}"
        method:      GET
        status_code: 200
        return_content: true
      register: _verify_trust_register

    - name: "Verify | bootstrap_capn_secret | filter trust entries restricted to project"
      ansible.builtin.set_fact:
        _verify_capn_entries: >-
          {{
            (_verify_trust_register.json.metadata | default([]))
            | selectattr('type', 'equalto', 'client')
            | selectattr('restricted', 'equalto', true)
            | selectattr('projects', 'contains', _project)
            | list
          }}

    - name: "Verify | bootstrap_capn_secret | assert exactly one project-restricted client cert"
      ansible.builtin.assert:
        that:
          - (_verify_capn_entries | length) == 1
          - (_verify_capn_entries[0].name | default('')) == 'k8slab-capn'
        fail_msg: >-
          expected exactly one trust entry restricted to project
          "{{ _project }}", got {{ _verify_capn_entries | length }};
          names={{ _verify_capn_entries | map(attribute='name') | list }}.

    # ---- Secret materialised in every target namespace --------------
    #
    # Per plan §13.11: Secret fanout across k8s_lab_capn_identity_namespaces.
    # Default scenario (= shared group_vars) ships ["capi-clusters"]; an
    # extended scenario can set the global to a multi-element list and
    # this loop scales accordingly.

    - name: "Verify | bootstrap_capn_secret | fetch live Secret per target namespace"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _kubeconfig }}"
        api_version: "v1"
        kind: "Secret"
        namespace: "{{ item }}"
        name: "{{ _name }}"
      register: _verify_secret_fanout
      loop: "{{ _namespaces }}"
      loop_control:
        label: "{{ item }}"

    - name: "Verify | bootstrap_capn_secret | assert each Secret carries 5 required keys + correct values"
      ansible.builtin.assert:
        that:
          # Exactly one Secret per namespace probe.
          - (item.resources | length) == 1
          # All 5 required keys present.
          - "'server' in (item.resources[0].data | default({}))"
          - "'server-crt' in (item.resources[0].data | default({}))"
          - "'client-crt' in (item.resources[0].data | default({}))"
          - "'client-key' in (item.resources[0].data | default({}))"
          - "'project' in (item.resources[0].data | default({}))"
          # `server` URL points at the internal-net :8443 listener.
          - (item.resources[0].data['server'] | b64decode) is search('^https://10\\.77\\..*:8443$')
          # `project` matches the project-wide global.
          - (item.resources[0].data['project'] | b64decode) == _project
          # Cert / key payloads are well-formed PEM.
          - (item.resources[0].data['server-crt'] | b64decode) is search('-----BEGIN CERTIFICATE-----')
          - (item.resources[0].data['client-crt'] | b64decode) is search('-----BEGIN CERTIFICATE-----')
          - (item.resources[0].data['client-key'] | b64decode) is search('-----BEGIN .*PRIVATE KEY-----')
        fail_msg: >-
          Secret drift in namespace "{{ item.item }}":
          live keys = {{ (item.resources[0].data | default({})).keys() | list }}.
      loop: "{{ _verify_secret_fanout.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Verify | bootstrap_capn_secret | assert pivot move label present by default"
      # `bootstrap_capn_secret_pivot_enabled: true` is the default (plan
      # §3 + §10 — pivot is mandatory in the canonical k8s-lab flow), so
      # the `clusterctl move` label MUST appear on every fanout Secret
      # to ensure clusterctl move carries them across to mgmt-1.
      ansible.builtin.assert:
        that:
          - >-
            (
              (item.resources[0].metadata.labels | default({}))
              ['clusterctl.cluster.x-k8s.io/move'] | default('')
            ) == 'true'
        fail_msg: >-
          Secret in namespace "{{ item.item }}" missing the
          `clusterctl.cluster.x-k8s.io/move=true` label expected by the
          mandatory pivot flow. Live labels =
          {{ item.resources[0].metadata.labels | default({}) }}.
      loop: "{{ _verify_secret_fanout.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ---- TLS round-trip — server cert in Secret matches LXD's ------
    # Catches the foot-gun where someone ran `lxc remote ...` to
    # re-generate server.crt and the role's old slurp got stale.
    # One probe is enough — the server cert is identical across every
    # fanout Secret (same source slurp).
    - name: "Verify | bootstrap_capn_secret | read live LXD server cert"
      ansible.builtin.slurp:
        src: "/var/snap/lxd/common/lxd/server.crt"
      register: _verify_live_server_cert_register

    - name: "Verify | bootstrap_capn_secret | assert server-crt in first Secret matches live"
      ansible.builtin.assert:
        that:
          - >-
            (_verify_live_server_cert_register.content | b64decode | trim)
            == (_verify_secret_fanout.results[0].resources[0].data['server-crt'] | b64decode | trim)
        fail_msg: >-
          server-crt key in the Secret (namespace
          "{{ _verify_secret_fanout.results[0].item }}") does not match
          the live LXD server cert at
          /var/snap/lxd/common/lxd/server.crt.
      when: _verify_secret_fanout.results | length > 0
