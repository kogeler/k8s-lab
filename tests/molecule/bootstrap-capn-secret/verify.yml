---
# bootstrap_capn_secret verify — plan §9.4 real-runtime assertions.
# Re-probes live state from the host independently of the role's own
# healthchecks. All Kubernetes reads go through kubernetes.core.k8s_info.

- name: "Verify | bootstrap_capn_secret"
  hosts: all
  gather_facts: true
  become: true
  vars:
    _kubeconfig: "/opt/capi-lab/etc/bootstrap_clusterctl/bootstrap.kubeconfig"
    _socket:     "/var/snap/lxd/common/lxd/unix.socket"
    _project:    "capi-lab"
    _namespace:  "capn-system"
    _name:       "incus-identity"
  tasks:
    # ---- Live LXD daemon has HTTPS listener bound on capi-int IP -----
    - name: "Verify | bootstrap_capn_secret | read LXD daemon config"
      ansible.builtin.uri:
        url:         "http://localhost/1.0"
        unix_socket: "{{ _socket }}"
        method:      GET
        status_code: 200
        return_content: true
      register: _verify_daemon_register

    - name: "Verify | bootstrap_capn_secret | record live https_address"
      ansible.builtin.set_fact:
        _verify_https: >-
          {{ (_verify_daemon_register.json.metadata.config | default({}))['core.https_address'] | default('') }}

    - name: "Verify | bootstrap_capn_secret | assert HTTPS listener bound to capi-int IP"
      ansible.builtin.assert:
        that:
          - _verify_https | length > 0
          - _verify_https is search('^10\\.77\\.')
          - _verify_https is search(':8443$')
        fail_msg: >-
          core.https_address not bound on capi-int subnet:
          got "{{ _verify_https }}".

    # ---- LXD trust store has exactly one project-restricted entry ----
    - name: "Verify | bootstrap_capn_secret | list trust store"
      ansible.builtin.uri:
        url:         "http://localhost/1.0/certificates?recursion=1"
        unix_socket: "{{ _socket }}"
        method:      GET
        status_code: 200
        return_content: true
      register: _verify_trust_register

    - name: "Verify | bootstrap_capn_secret | filter trust entries restricted to capi-lab"
      ansible.builtin.set_fact:
        _verify_capn_entries: >-
          {{
            (_verify_trust_register.json.metadata | default([]))
            | selectattr('type', 'equalto', 'client')
            | selectattr('restricted', 'equalto', true)
            | selectattr('projects', 'contains', _project)
            | list
          }}

    - name: "Verify | bootstrap_capn_secret | assert exactly one capi-lab-restricted client cert"
      ansible.builtin.assert:
        that:
          - (_verify_capn_entries | length) == 1
          - (_verify_capn_entries[0].name | default('')) == 'k8slab-capn'
        fail_msg: >-
          expected exactly one trust entry restricted to project
          "{{ _project }}", got {{ _verify_capn_entries | length }};
          names={{ _verify_capn_entries | map(attribute='name') | list }}.

    # ---- Kubernetes Secret carries all 5 required keys --------------
    - name: "Verify | bootstrap_capn_secret | fetch live Secret"
      kubernetes.core.k8s_info:
        kubeconfig: "{{ _kubeconfig }}"
        api_version: "v1"
        kind: "Secret"
        namespace: "{{ _namespace }}"
        name: "{{ _name }}"
      register: _verify_secret_register

    - name: "Verify | bootstrap_capn_secret | record decoded Secret data"
      # `data` from the API is base64 — decode each value once into
      # the shape the assertions below expect.
      ansible.builtin.set_fact:
        _verify_secret_data: >-
          {{
            dict(
              (_verify_secret_register.resources[0].data | default({})).keys()
              | zip(
                  (_verify_secret_register.resources[0].data | default({})).values()
                  | map('b64decode') | list
                )
            )
          }}

    - name: "Verify | bootstrap_capn_secret | assert all 5 required keys present"
      ansible.builtin.assert:
        that:
          - "'server' in _verify_secret_data"
          - "'server-crt' in _verify_secret_data"
          - "'client-crt' in _verify_secret_data"
          - "'client-key' in _verify_secret_data"
          - "'project' in _verify_secret_data"
        fail_msg: >-
          Secret missing CAPN identity-spec keys.
          got keys = {{ _verify_secret_data.keys() | list }}.

    - name: "Verify | bootstrap_capn_secret | assert Secret values match contract"
      ansible.builtin.assert:
        that:
          - _verify_secret_data['server'] is search('^https://10\\.77\\..*:8443$')
          - _verify_secret_data['project'] == _project
          - _verify_secret_data['client-crt'] is search('-----BEGIN CERTIFICATE-----')
          - _verify_secret_data['server-crt'] is search('-----BEGIN CERTIFICATE-----')
          - _verify_secret_data['client-key'] is search('-----BEGIN .*PRIVATE KEY-----')
        fail_msg: >-
          Secret value drift. server={{ _verify_secret_data['server'] }},
          project={{ _verify_secret_data['project'] }}.

    # ---- Pivot label discipline (default k8s_lab_pivot_enabled=false) -------
    - name: "Verify | bootstrap_capn_secret | assert no pivot label by default"
      ansible.builtin.assert:
        that:
          - >-
            (
              (_verify_secret_register.resources[0].metadata.labels | default({}))
              ['clusterctl.cluster.x-k8s.io/move'] | default('')
            ) | length == 0
        fail_msg: >-
          Secret unexpectedly carries `clusterctl.cluster.x-k8s.io/move`
          label while k8s_lab_pivot_enabled defaults to false.

    # ---- TLS round-trip — server cert in Secret matches LXD's ------
    # Catches the foot-gun where someone ran `lxc remote ...` to
    # re-generate server.crt and the role's old slurp got stale.
    - name: "Verify | bootstrap_capn_secret | read live LXD server cert"
      ansible.builtin.slurp:
        src: "/var/snap/lxd/common/lxd/server.crt"
      register: _verify_live_server_cert_register

    - name: "Verify | bootstrap_capn_secret | assert server-crt in Secret matches live"
      ansible.builtin.assert:
        that:
          - (_verify_live_server_cert_register.content | b64decode | trim) == (_verify_secret_data['server-crt'] | trim)
        fail_msg: >-
          server-crt key in the Secret does not match the live LXD
          server cert at /var/snap/lxd/common/lxd/server.crt.
