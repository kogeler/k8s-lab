---
# bootstrap_capn_secret scenario prepare.

- name: "Prepare | bootstrap_capn_secret"
  hosts: all
  gather_facts: true
  become: true
  vars:
    _molecule_project_dir: "{{ lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') }}"
  vars_files:
    - "../shared/vars/common.yml"
  tasks:
    - name: "Prepare | bootstrap_capn_secret | shared base"
      ansible.builtin.include_tasks:
        file: "{{ _molecule_project_dir }}/shared/tasks/prepare.yml"

    - name: "Prepare | bootstrap_capn_secret | clean pool disk"
      ansible.builtin.include_tasks:
        file: "{{ _molecule_project_dir }}/shared/tasks/prepare-clean-disk.yml"
