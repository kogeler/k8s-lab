---
# Molecule scenario for the binary_fetch role.
#
# Driver: delegated — shared Vagrant/libvirt VM (plan §9.1). VM lifecycle
# is owned by scripts/molecule_run.py.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../ansible/requirements.yml

driver:
  name: default
  options:
    managed: false

platforms:
  - name: k8slab-host
    groups:
      - k8slab_host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: ansible.builtin.default
      result_format: yaml
      forks: 5
      callbacks_enabled: ansible.posix.profile_tasks
    ssh_connection:
      pipelining: true
  inventory:
    host_vars:
      k8slab-host:
        _shared_target_role: binary_fetch
        # binary_fetch pulls base_system in via meta deps — base_system's
        # btrfs pool contract stays off because this scenario does not
        # exercise LXD storage (plan §13.1 keeps the assertion optional).
        base_system_btrfs_pool_required: false
        # Connection coordinates come from env vars populated by
        # `scripts/molecule_run.py`.
        ansible_host:                 "{{ lookup('env', 'K8SLAB_HOST_ADDR') }}"
        ansible_user:                 "{{ lookup('env', 'K8SLAB_HOST_USER') }}"
        ansible_port:                 "{{ lookup('env', 'K8SLAB_HOST_PORT') | int }}"
        ansible_ssh_private_key_file: "{{ lookup('env', 'K8SLAB_HOST_KEY') }}"
        ansible_ssh_common_args:      "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  playbooks:
    prepare:  prepare.yml
    converge: ${MOLECULE_PROJECT_DIRECTORY}/shared/converge.yml
    verify:   verify.yml

scenario:
  name: binary_fetch
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
