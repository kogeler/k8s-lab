---
# Scenario-local host_vars. Shared substrate defaults live in
# `tests/molecule/shared/inventory/group_vars/k8slab_host.yml`.

# LXD owns the pool disk (meta-chain from lxd_bootstrap_instance include
# in prepare.yml claims it). `prepare-clean-disk.yml` hands LXD a
# signature-free device, leaving nothing at the btrfs mount path the
# shared default asserts. Override disables base_system's btrfs-mount
# contract for this scenario; base-system scenario still tests the
# contract end-to-end with `required: true`.
base_system_btrfs_pool_required: false

# Scenario-local artifacts root. Kept separate from the repo's real
# `.artifacts/` (owned by the `export_artifacts` scenario / full e2e
# path) so cleanup-bootstrap wipes only its own sentinel and cannot
# trash a concurrent export. Resolved at var-access time from the
# MOLECULE_PROJECT_DIRECTORY env var (= tests/molecule/), so two
# dirnames land on the repo root.
cleanup_bootstrap_artifacts_root: >-
  {{ lookup('ansible.builtin.env', 'MOLECULE_PROJECT_DIRECTORY') | dirname | dirname }}/.artifacts-cleanup-bootstrap-test
