---
# Molecule scenario for the lxd_bootstrap_instance role.
#
# Driver: delegated — shared Vagrant/libvirt VM (plan §9.1). VM lifecycle
# is owned by scripts/molecule_run.py.

dependency:
  name: galaxy
  options:
    requirements-file: ../../../ansible/requirements.yml

driver:
  name: default
  options:
    managed: false

platforms:
  - name: k8slab-host
    groups:
      - k8slab_host

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: ansible.builtin.default
      result_format: yaml
      forks: 5
      callbacks_enabled: ansible.posix.profile_tasks
    ssh_connection:
      pipelining: true
  inventory:
    host_vars:
      k8slab-host:
        _shared_target_role: lxd_bootstrap_instance
        # Required lxd_host override (meta-dep chain).
        lxd_host_ext_bridge_uplink: "eth2"
        # lxd_storage_pools runs transitively — point it at the
        # Vagrant-attached dedicated disk.
        lxd_storage_pools_pools:
          - name:        "capi-fast"
            driver:      "btrfs"
            description: "k8s-lab primary pool (btrfs on dedicated disk)"
            config:
              source:              "/dev/disk/by-id/virtio-k8slab-lxdpool"
              btrfs.mount_options: "user_subvol_rm_allowed"
        # Image pull can take a while on a cold cache — give LXD
        # generous wall time. Plan §8 suggests 120s; bump to 300s
        # for first-run image fetch from images.linuxcontainers.org.
        lxd_bootstrap_instance_wait_timeout: 300
        ansible_host:                 "{{ lookup('env', 'K8SLAB_HOST_ADDR') }}"
        ansible_user:                 "{{ lookup('env', 'K8SLAB_HOST_USER') }}"
        ansible_port:                 "{{ lookup('env', 'K8SLAB_HOST_PORT') | int }}"
        ansible_ssh_private_key_file: "{{ lookup('env', 'K8SLAB_HOST_KEY') }}"
        ansible_ssh_common_args:      "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  playbooks:
    prepare:  prepare.yml
    converge: ${MOLECULE_PROJECT_DIRECTORY}/shared/converge.yml
    verify:   verify.yml

scenario:
  name: lxd_bootstrap_instance
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
