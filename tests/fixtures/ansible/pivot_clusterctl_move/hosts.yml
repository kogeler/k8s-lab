---
# Static one-host inventory for the pivot_clusterctl_move fixture
# playbook. Connection coordinates (ansible_host / user / port / key)
# come from the shared substrate vars at
# `tests/molecule/shared/inventory/group_vars/k8slab_host.yml` —
# pulled in via a second `-i <shared-inventory-dir>` Ansible argument
# in the `deploy-pivot` Make recipe. Those vars resolve from
# `K8SLAB_HOST_*` env vars exported by the recipe before invoking
# ansible-playbook (parsed once from `vagrant ssh-config host`).

all:
  children:
    k8slab_host:
      hosts:
        k8slab-host:
