---
# ==========================================================================
# base_system — role defaults
# ==========================================================================
#
# Purpose: minimal Debian 13 host preparation for the k8s-lab stack. Only
# packages explicitly allowed by plan §2.2 are installed here; every other
# tool is expected to be delivered by `binary_fetch` or `lxd_host`.
#
# The substrate-required package set, kernel modules and sysctl knobs are
# baked into `vars/main.yml` (`_base_system_required_*`) so a consumer
# cannot accidentally disable them by overriding a default to `[]` / `{}`.
# This file holds only what consumers legitimately tune — paths, cache
# freshness, flow-control toggles — plus `*_extra_*` extension points
# appended on top of the required baseline at task time.
#
# Public contract (plan §2.6.2): variables exposed to callers are prefixed
# `base_system_*`. Helper / computed facts use the `_base_system_*` prefix
# and must stay internal.

# -- General ---------------------------------------------------------------

# Toggle the whole role. When false, preflight still runs (to assert inputs
# are coherent) but no mutating task is applied. Matches the flow-control
# naming rule from plan §2.6.3.
base_system_enabled: true

# Role-wide filesystem root. Sources from the project-wide global
# `k8s_lab_opt_root` (plan §8) so that every role which consumes the
# opt root stays consistent when the consumer overrides the global.
base_system_opt_root: "{{ k8s_lab_opt_root | default('/opt/capi-lab') }}"

# Owner/group/mode for the opt root. Deterministic per plan §16.1.
base_system_opt_owner: "root"
base_system_opt_group: "root"
base_system_opt_mode:  "0755"

# -- Packages --------------------------------------------------------------
#
# Required packages live in `vars/main.yml` as `_base_system_required_packages`.
# This list is merged on top — use it for site-specific extras (e.g. a
# diagnostic package set or a vendor agent). Empty by default.
base_system_extra_packages: []

# Btrfs tooling capability. The required package list
# (`_base_system_btrfs_required_packages`) ships `btrfs-progs`; the
# toggle below is kept as a public knob so consumers can opt out on hosts
# that use ZFS/dir-backed pools. Extras append on top when the toggle is
# on — e.g. `btrfsmaintenance`.
base_system_btrfs_enabled: true
base_system_btrfs_extra_packages: []

# APT cache freshness window (seconds). Keeps converge/idempotence fast
# while not being so stale that newly added packages fail to resolve.
base_system_apt_cache_valid_time: 3600

# -- Kernel / sysctl -------------------------------------------------------

# Required sysctl knobs live in `vars/main.yml` as `_base_system_required_sysctl`.
# The extras map is merged AFTER the required baseline (required keys
# always win) so an override here cannot silently disable a required knob.
base_system_sysctl_apply: true
base_system_extra_sysctl: {}

# -- Kernel modules --------------------------------------------------------
#
# Required modules live in `vars/main.yml` as `_base_system_required_kernel_modules`.
# This list is appended — use it for extras (e.g. `wireguard`, `nbd`).
base_system_extra_kernel_modules: []

# -- Flow control ---------------------------------------------------------

# Fine-grained feature toggles are coarse by design (plan §2.6.3): role-
# level and major-section only. No per-task switches.
base_system_flow_control_packages: true
base_system_flow_control_sysctl:   true
base_system_flow_control_modules:  true

# -- LXD Btrfs pool contract ----------------------------------------------
#
# base_system does NOT format or mount the pool disk — host storage
# provisioning is a responsibility of whoever prepares the machine
# (Molecule shared prepare in tests; the operator / an installer image in
# production). What base_system owns is the **contract**: when pool is
# required, assert that the expected mountpoint exists and really is a
# btrfs filesystem. This keeps downstream roles (lxd_storage_pools) from
# happily pointing LXD at a path that silently falls back to the OS disk.
#
# This is a deliberate, documented deviation from the original narrow
# packages-only scope of `base_system`; the Step 1 deviation note lives
# inline in plan §13.1.
base_system_btrfs_pool_required:   false
base_system_btrfs_pool_mountpoint: "/var/lib/k8slab/lxd-pool"
base_system_btrfs_pool_fstype:     "btrfs"
base_system_btrfs_pool_label:      "k8slab-lxdpool"
