---
# ==========================================================================
# lxd_profiles — role defaults
# ==========================================================================
#
# Purpose (plan §13.6): create and configure the four k8s-lab LXD
# profiles — `capi-base`, `capi-bootstrap`, `capi-controlplane`,
# `capi-worker` — inside the capi-lab project. The substrate-required
# config (nesting, idmap, syscall intercepts, kernel modules, apparmor
# override, root disk, nic topology) is hardcoded in `vars/main.yml`
# so a consumer cannot accidentally disable it by overriding a default.
# This file holds only shared inputs a consumer legitimately tunes and
# per-profile extension points for adding extras on top.
#
# Public contract (plan §2.6.2): variables exposed to callers use the
# `lxd_profiles_*` prefix. Internal / derived facts use
# `_lxd_profiles_*` and must stay inside the role.

# -- General ---------------------------------------------------------------

# Whole-role toggle. When false, preflight still runs (to catch input
# drift) but no mutating task is applied.
lxd_profiles_enabled: true

# LXD daemon socket URI consumed by community.general.lxd_profile.
# Note the `unix:` prefix — the community module expects a URI, unlike
# ansible.builtin.uri which wants a bare filesystem path.
lxd_profiles_lxd_socket_uri: "unix:/var/snap/lxd/common/lxd/unix.socket"

# Project the profiles live in. Must match lxd_project_name on the
# host — cross-role coupling is by value, not by reading the other
# role's prefixed variable (plan §2.6.5 bans `<other_role>_*` reads).
lxd_profiles_project: "capi-lab"

# -- Shared device targets ------------------------------------------------
#
# The role-internal catalogue (vars/main.yml) resolves these at
# runtime when building each profile's disk / nic devices. Consumers
# override to re-point every profile at a different pool / bridge /
# guest ifname with a handful of values instead of touching the
# per-profile device dicts.
lxd_profiles_storage_pool:       "capi-fast"
lxd_profiles_internal_network:   "capi-int"
lxd_profiles_external_bridge:    "br-ext6"
lxd_profiles_internal_ifname:    "eth0"
lxd_profiles_external_ifname:    "eth1"

# -- Per-profile extensions -----------------------------------------------
#
# Merged on top of the substrate-required baseline (vars/main.yml) by
# tasks/compose.yml before the apply step. Keys set here WIN over the
# baseline — use this to tune non-critical knobs (e.g. a raw.idmap
# override, an extra disk device), not to remove required values. If
# a consumer needs to disable something the baseline sets, that is a
# signal to file an issue and get the role fixed, not to paper over
# it via an extra.
lxd_profiles_capi_base_extra_config: {}
lxd_profiles_capi_base_extra_devices: {}

lxd_profiles_capi_bootstrap_extra_config: {}
lxd_profiles_capi_bootstrap_extra_devices: {}

lxd_profiles_capi_controlplane_extra_config: {}
lxd_profiles_capi_controlplane_extra_devices: {}

lxd_profiles_capi_worker_extra_config: {}
lxd_profiles_capi_worker_extra_devices: {}

# -- Flow control (plan §2.6.3) -------------------------------------------
#
# Coarse-grained only.
lxd_profiles_flow_control_profiles: true
