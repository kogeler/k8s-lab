---
# Materialise a runner-reachable kubeconfig for the target mgmt cluster.
#
# Source of truth: the `<cluster_name>-kubeconfig` Secret in
# capi-clusters/ on the BOOTSTRAP cluster, written by KCP after the
# target's control plane finishes initialising. CAPN's haproxy LB
# instance gets an LXD `proxy` device attached by
# `capi-workload-cluster`'s post-install hook (Job
# `api-proxy-attach`), so the LXD host has a runner-reachable port
# `<lxd_host>:<api-proxy-port>` forwarding to the workload's
# kube-apiserver. The port lives in the Cluster CR annotation
# `k8s-lab.io/api-proxy-port` (helper-computed from cluster.name —
# see charts/capi-workload-cluster/_helpers.tpl).
#
# We:
#   1) ensure staging dir exists with restrictive ownership;
#   2) probe bootstrap for the target Cluster CR (the post-pivot
#      idempotence path: after `clusterctl move` the CR is gone from
#      bootstrap; we then fall back to whatever the host already has
#      on disk);
#   3) for the still-pre-pivot case: read the kubeconfig Secret +
#      the api-proxy-port annotation, decode + rewrite + write the
#      target kubeconfig with mode 0600.
#
# Idempotence: the rewritten kubeconfig content is a deterministic
# function of (Secret bytes, cluster name, api-proxy port, lxd host
# address). ansible.builtin.copy compares rendered content to the
# existing file and reports `changed=false` on byte match — no extra
# drift check needed (plan §2.6.1).

- name: "pivot-clusterctl-move | target_kubeconfig | ensure staging dir on host"
  ansible.builtin.file:
    path:  "{{ pivot_clusterctl_move_staging_dir }}"
    state: directory
    owner: "root"
    group: "root"
    mode:  "{{ pivot_clusterctl_move_staging_mode_dir }}"

# Idempotence probe (1 of 2): does the bootstrap cluster still own the
# target Cluster CR? After a successful `clusterctl move`, the answer
# is "no" and we cannot recompute the rewritten kubeconfig from the
# Secret (Secret moved with the CR). The on-disk kubeconfig from the
# previous converge is still valid (target API is still reachable on
# the same proxy port) — we leave it untouched.
- name: "pivot-clusterctl-move | target_kubeconfig | probe bootstrap for target Cluster CR"
  kubernetes.core.k8s_info:
    kubeconfig:  "{{ pivot_clusterctl_move_bootstrap_kubeconfig_path }}"
    api_version: "{{ _pivot_clusterctl_move_required_cluster_api_version }}"
    kind:        "Cluster"
    namespace:   "{{ pivot_clusterctl_move_target_cluster_namespace }}"
    name:        "{{ pivot_clusterctl_move_target_cluster_name }}"
  register: _pivot_clusterctl_move_bootstrap_cluster_register
  changed_when: false

- name: "pivot-clusterctl-move | target_kubeconfig | record bootstrap-side cluster presence"
  ansible.builtin.set_fact:
    _pivot_clusterctl_move_target_on_bootstrap: >-
      {{ (_pivot_clusterctl_move_bootstrap_cluster_register.resources | default([])) | length > 0 }}

# Idempotence probe (2 of 2): if bootstrap no longer has the CR, we
# rely on whatever target kubeconfig was written on the previous
# converge. The init/move steps below probe the target API directly,
# so if the file is stale we'll surface a concrete error there.
- name: "pivot-clusterctl-move | target_kubeconfig | stat existing target kubeconfig"
  ansible.builtin.stat:
    path: "{{ pivot_clusterctl_move_target_kubeconfig_path }}"
  register: _pivot_clusterctl_move_target_kc_stat_register
  changed_when: false

- name: "pivot-clusterctl-move | target_kubeconfig | assert post-pivot fallback file is present"
  ansible.builtin.assert:
    that:
      - _pivot_clusterctl_move_target_kc_stat_register.stat.exists
      - _pivot_clusterctl_move_target_kc_stat_register.stat.isreg
    fail_msg: >-
      pivot_clusterctl_move: target Cluster CR is absent from bootstrap
      (already moved?) AND no on-disk kubeconfig at
      {{ pivot_clusterctl_move_target_kubeconfig_path }} to fall back
      to. Either the target mgmt cluster was never created, or the
      staging dir was wiped between converges. Re-run the orchestrator
      step that creates the target mgmt cluster (charts/capi-* via TF
      module §16.4 or equivalent) and re-converge.
  when: not _pivot_clusterctl_move_target_on_bootstrap

# ---- Pre-pivot path: cluster CR still on bootstrap → refresh kubeconfig ---

- name: "pivot-clusterctl-move | target_kubeconfig | wait for kubeconfig Secret on bootstrap"
  kubernetes.core.k8s_info:
    kubeconfig:  "{{ pivot_clusterctl_move_bootstrap_kubeconfig_path }}"
    api_version: "v1"
    kind:        "Secret"
    namespace:   "{{ pivot_clusterctl_move_target_cluster_namespace }}"
    name:        "{{ pivot_clusterctl_move_target_cluster_name }}-kubeconfig"
  register: _pivot_clusterctl_move_target_kc_secret_register
  retries: "{{ pivot_clusterctl_move_wait_target_kubeconfig_retries | int }}"
  delay:   "{{ pivot_clusterctl_move_wait_target_kubeconfig_delay | int }}"
  until: >-
    (_pivot_clusterctl_move_target_kc_secret_register.resources | default([]) | length) == 1
    and ((_pivot_clusterctl_move_target_kc_secret_register.resources[0].data.value | default('')) | length) > 0
  changed_when: false
  when: _pivot_clusterctl_move_target_on_bootstrap

- name: "pivot-clusterctl-move | target_kubeconfig | read api-proxy-port annotation from Cluster CR"
  ansible.builtin.set_fact:
    _pivot_clusterctl_move_target_api_proxy_port: >-
      {{
        (_pivot_clusterctl_move_bootstrap_cluster_register.resources[0].metadata.annotations
         | default({}))[_pivot_clusterctl_move_required_api_proxy_port_annotation]
        | default('')
      }}
  when: _pivot_clusterctl_move_target_on_bootstrap

- name: "pivot-clusterctl-move | target_kubeconfig | assert api-proxy-port annotation present"
  ansible.builtin.assert:
    that:
      - _pivot_clusterctl_move_target_api_proxy_port is string
      - _pivot_clusterctl_move_target_api_proxy_port is match('^[0-9]+$')
      - (_pivot_clusterctl_move_target_api_proxy_port | int) > 0
    fail_msg: >-
      pivot_clusterctl_move: Cluster CR
      {{ pivot_clusterctl_move_target_cluster_namespace }}/{{ pivot_clusterctl_move_target_cluster_name }}
      lacks the {{ _pivot_clusterctl_move_required_api_proxy_port_annotation }}
      annotation, or it does not contain a positive integer port. The
      capi-workload-cluster chart's `_helpers.tpl apiProxyPort` helper
      must populate this annotation — re-check that the chart was
      installed with default values (or `loadBalancer.lxc.proxyApiPort`
      override) before pivot.
  when: _pivot_clusterctl_move_target_on_bootstrap

# Decode the in-cluster kubeconfig once into a structured dict, then
# rewrite every `clusters[].cluster.server` URL to the runner-reachable
# proxy + pin tls-server-name (same mechanic bootstrap_clusterctl uses
# in kubeconfig.yml; see plan §16.7 for the proxy-port architecture).
- name: "pivot-clusterctl-move | target_kubeconfig | rewrite kubeconfig server URL + tls-server-name"
  ansible.builtin.set_fact:
    _pivot_clusterctl_move_target_kubeconfig_body: >-
      {{
        (_pivot_clusterctl_move_target_kc_secret_register.resources[0].data.value
         | b64decode | from_yaml)
        | combine({
            'clusters': (
              (_pivot_clusterctl_move_target_kc_secret_register.resources[0].data.value
               | b64decode | from_yaml).clusters
              | map('combine', {
                  'cluster': {
                    'server': 'https://' ~ pivot_clusterctl_move_target_api_address
                              ~ ':' ~ _pivot_clusterctl_move_target_api_proxy_port,
                    'tls-server-name': _pivot_clusterctl_move_required_tls_server_name
                  }
                }, recursive=True)
              | list
            )
          }, recursive=True)
      }}
  when: _pivot_clusterctl_move_target_on_bootstrap

- name: "pivot-clusterctl-move | target_kubeconfig | write target kubeconfig"
  ansible.builtin.copy:
    content: "{{ _pivot_clusterctl_move_target_kubeconfig_body | to_nice_yaml(indent=2) }}"
    dest:    "{{ pivot_clusterctl_move_target_kubeconfig_path }}"
    owner:   "root"
    group:   "root"
    mode:    "{{ pivot_clusterctl_move_staging_mode_kubeconfig }}"
  when: _pivot_clusterctl_move_target_on_bootstrap

# /livez probe through the rewritten endpoint. KCP may report Ready
# slightly before the LXD proxy device is fully wired (race between the
# capi-workload-cluster post-install hook and the data-path); poll
# until the apiserver answers. 200 (cluster healthy) and 401/403 (auth
# required without admin token) all confirm the data plane is up.
- name: "pivot-clusterctl-move | target_kubeconfig | wait for target kube-apiserver /livez"
  ansible.builtin.uri:
    url: >-
      https://{{ pivot_clusterctl_move_target_api_address }}:{{
      _pivot_clusterctl_move_target_api_proxy_port }}/livez
    method:         GET
    validate_certs: false
    status_code:    [200, 401, 403]
    timeout:        10
  register: _pivot_clusterctl_move_target_livez_register
  retries: "{{ pivot_clusterctl_move_wait_retries | int }}"
  delay:   "{{ pivot_clusterctl_move_wait_delay | int }}"
  until: _pivot_clusterctl_move_target_livez_register.status in [200, 401, 403]
  changed_when: false
  when: _pivot_clusterctl_move_target_on_bootstrap
