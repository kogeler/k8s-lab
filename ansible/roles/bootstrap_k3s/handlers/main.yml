---
# Handlers for bootstrap_k3s. Kept minimal per plan §2.6.4 —
# only reactive ops belong here; business logic stays in tasks/.

- name: "bootstrap-k3s | handlers | daemon-reload"
  ansible.builtin.command:
    argv:
      - "{{ bootstrap_k3s_lxc_cli }}"
      - "exec"
      - "--project={{ bootstrap_k3s_project }}"
      - "{{ bootstrap_k3s_instance_name }}"
      - "--"
      - "systemctl"
      - "daemon-reload"
  changed_when: true

- name: "bootstrap-k3s | handlers | restart k3s"
  ansible.builtin.command:
    argv:
      - "{{ bootstrap_k3s_lxc_cli }}"
      - "exec"
      - "--project={{ bootstrap_k3s_project }}"
      - "{{ bootstrap_k3s_instance_name }}"
      - "--"
      - "systemctl"
      - "restart"
      - "{{ bootstrap_k3s_service_name }}.service"
  changed_when: true
