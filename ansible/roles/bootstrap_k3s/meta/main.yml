---
galaxy_info:
  role_name: bootstrap_k3s
  namespace: k8slab
  author: k8s-lab contributors
  description: >-
    Install k3s inside the LXC bootstrap container and start a single-node
    cluster with Stage 1 defaults (no Traefik, no servicelb). Does NOT
    install kubectl/clusterctl inside the container (plan §16.3) and
    does NOT publish the API outside the host (plan §16.5) — those
    live in dedicated Phase 4 roles.
  license: MIT
  min_ansible_version: "2.16"
  platforms:
    - name: Debian
      versions:
        - trixie
  galaxy_tags:
    - kubernetes
    - k3s
    - bootstrap

dependencies:
  # binary_fetch delivers `k3s` to the host's /opt/capi-lab/bin — the
  # source of the `lxc file push` this role performs. Declaring it as
  # a meta-dep is what keeps the Phase-4 playbook call sites slim
  # (plan §2.6.5 bans emulating ordering from the consumer side).
  - role: binary_fetch
  # lxd_bootstrap_instance creates + starts capi-bootstrap-0 inside
  # the capi-lab project. It transitively pulls lxd_profiles and the
  # rest of the LXD substrate chain.
  - role: lxd_bootstrap_instance
