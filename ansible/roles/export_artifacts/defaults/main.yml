---
# ==========================================================================
# export_artifacts — role defaults
# ==========================================================================
#
# Purpose (plan §15.6): close Phase 4 by shipping the handoff bundle to
# the runner's `.artifacts/` dir — specifically:
#
#   1) mgmt.kubeconfig — the admin kubeconfig for the active management
#      cluster (in MVP path that is the bootstrap k3s cluster, materialised
#      on the LXD host by `bootstrap_clusterctl` and rewritten to reach
#      the container's eth0 IPv4 instead of 127.0.0.1; in the Stage 2
#      pivot path the same file is overwritten in place by
#      `pivot_clusterctl_move` after `clusterctl move`);
#   2) mgmt.auto.tfvars.json — the fact bundle Phase 5 Terraform
#      fixtures auto-load (cluster identity, CAPN version, topology
#      toggles, mgmt API endpoint derived from the kubeconfig).
#
# Execution model:
#   Role runs on the LXD host via the `bootstrap_capn_secret` meta-dep
#   chain. Artefact-write tasks flip to `delegate_to: localhost,
#   become: false, run_once: true` so the files land on the runner with
#   runner-user ownership and 0600 permissions (plan §11.1). No
#   controller-side root is required.
#
# Public contract (plan §2.6.2): every variable exposed to callers is
# prefixed `export_artifacts_*`. Internal / derived facts use the
# `_export_artifacts_*` prefix.
#
# Substrate-required values (memory `feedback_required_values_hardcoded.md`):
# artefact filenames, tfvars naming convention, file modes live in
# `vars/main.yml` under the `_export_artifacts_required_*` prefix and
# are NOT exposed below.

# -- General ---------------------------------------------------------------

# Whole-role toggle. When false, preflight still runs to catch
# inconsistent inputs but no artefact is materialised.
export_artifacts_enabled: true

# Meta-dependency dispatch (consumed by `meta/main.yml` via `when:`).
# Default `true` keeps the canonical Phase 4 flow: bootstrap_capn_secret
# (and its transitive chain — base_system → … → bootstrap_clusterctl)
# is imported automatically. Flip to `false` for post-pivot re-emit
# invocations from the same play, where the substrate is already
# reconciled and the second meta-chain run would be wasted (or fail
# outright once `cleanup_bootstrap` has retired the bootstrap LXC).
# See plan §13.12 + tests/molecule/e2e-local/converge.yml.
export_artifacts_run_meta_chain: true

# Controller-side directory that will hold the handoff bundle. MUST be
# an absolute path on the runner — there is no auto-guessing because
# the repo's `.artifacts/` location is a consumer policy decision
# (plan §11.1 only fixes the contract, not the path). The Molecule
# scenario passes
# `{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/../../.artifacts`
# so the file lands under the repo root; production consumers point
# it at wherever they keep runner state.
export_artifacts_root: ""

# -- Per-artefact toggles -------------------------------------------------

# mgmt.kubeconfig — always produced on the standard Phase 4 path;
# disable only for diagnostic reruns where the consumer has another
# source.
export_artifacts_mgmt_kubeconfig_enabled: true

# mgmt.auto.tfvars.json — Phase 5 Terraform fixtures depend on it;
# disable only if the consumer wires Phase 5 vars through some other
# handoff mechanism.
export_artifacts_tfvars_enabled: true

# -- Source paths on the LXD host -----------------------------------------

# Host-side kubeconfig produced by bootstrap_clusterctl. Default
# matches the path the upstream meta-dep materialises. If a consumer
# layers a custom `bootstrap_clusterctl_kubeconfig_path`, they can
# point us at it explicitly.
export_artifacts_mgmt_kubeconfig_source: "{{ k8s_lab_opt_root | default('/opt/capi-lab') }}/etc/bootstrap_clusterctl/bootstrap.kubeconfig"

# -- Optional server URL rewrite for the shipped kubeconfig --------------
#
# When empty, the shipped kubeconfig keeps the host-side server URL
# (typically `https://<container-ipv4>:6443` — reachable only from the
# LXD host). When non-empty, the role rewrites every
# `clusters[].cluster.server` to this value before writing the file to
# the runner's `.artifacts/`.
#
# The URL MUST be what the RUNNER can actually reach — usually an LXD
# proxy device listener on the LXD host (plan §15.5), e.g.
# `https://<lxd_host_ip>:16443`. TLS identity is decoupled from the URL
# via `tls-server-name` (pinned by bootstrap_clusterctl to a stable
# SAN baked into the k3s cert), so any URL that TCP-reaches the API
# works — no `--tls-san` override needed.
#
# Empty default is deliberate: consumers running Terraform on the LXD
# host itself (host-local runner) want the host-side URL as-is;
# consumers whose runner ≠ host must set this to their published
# endpoint.
export_artifacts_mgmt_api_server_url: ""

# -- Tunable extras ---------------------------------------------------

# Consumer-supplied dict merged on top of the baseline tfvars payload.
# Useful for propagating environment-specific values (e.g. an airgap
# mirror URL, a custom image fingerprint) without patching the role.
# The baseline keys win on collision (substrate guarantee) — if a
# consumer needs to shadow a baseline key, they should change the
# corresponding §8 global instead.
export_artifacts_tfvars_extra: {}

# -- Flow control (plan §2.6.3) -------------------------------------------

# Coarse-grained only — no per-task switches.
export_artifacts_flow_control_mgmt_kubeconfig: true
export_artifacts_flow_control_tfvars:           true
