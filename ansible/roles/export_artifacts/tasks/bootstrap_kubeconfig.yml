---
# Ship the host-side bootstrap.kubeconfig to the runner's `.artifacts/`
# dir. Two-step body pipeline:
#   1) slurp the host-side source (bootstrap_clusterctl already
#      pinned `tls-server-name` in the clusters[] block, so TLS
#      identity is decoupled from the server URL);
#   2) optionally rewrite `clusters[].cluster.server` to a
#      runner-reachable URL (plan §16.5 — typical pattern is an LXD
#      proxy device on the LXD host); serialise via `to_nice_yaml` so
#      the shipped body is byte-stable regardless of whether a rewrite
#      happened. Empty override keeps the host-side URL as-is.
#
# Reads on host run as root (to get past `/opt/capi-lab/etc/...` mode
# 0750). The copy to `.artifacts/` delegates to localhost with
# `become: false` so the file lands under the runner user's UID
# with mode 0600 (plan §11.1).
#
# Idempotence: `to_nice_yaml` produces deterministic output for
# identical inputs; `ansible.builtin.copy` compares bytes on the
# destination and skips the write when they match.

- name: "export-artifacts | bootstrap_kubeconfig | slurp source on host"
  ansible.builtin.slurp:
    src: "{{ export_artifacts_bootstrap_kubeconfig_source }}"
  register: _export_artifacts_kubeconfig_slurp

- name: "export-artifacts | bootstrap_kubeconfig | parse source kubeconfig"
  ansible.builtin.set_fact:
    _export_artifacts_kubeconfig_source_parsed: >-
      {{ _export_artifacts_kubeconfig_slurp.content | b64decode | from_yaml }}

- name: "export-artifacts | bootstrap_kubeconfig | optionally rewrite server URL"
  # When the override is set, combine(recursive=True) overlays the new
  # server on every clusters[] entry while preserving tls-server-name,
  # certificate-authority-data, and every other key the source
  # kubeconfig already carries. When the override is empty, the
  # parsed-source fact passes through untouched.
  ansible.builtin.set_fact:
    _export_artifacts_kubeconfig_shipped_obj: >-
      {{
        _export_artifacts_kubeconfig_source_parsed
        if (export_artifacts_bootstrap_api_server_url | length == 0)
        else (_export_artifacts_kubeconfig_source_parsed
              | combine({
                  'clusters': (
                    _export_artifacts_kubeconfig_source_parsed.clusters
                    | map('combine', {
                        'cluster': {
                          'server': export_artifacts_bootstrap_api_server_url
                        }
                      }, recursive=True)
                    | list
                  )
                }, recursive=True))
      }}

- name: "export-artifacts | bootstrap_kubeconfig | write to runner .artifacts/"
  # delegate_to: localhost + become: false ⇒ the file lands under the
  # runner user's UID. run_once: true keeps multi-host inventories
  # from re-writing the same file (future-proofing; Stage 1 harness
  # has a single host).
  ansible.builtin.copy:
    content: "{{ _export_artifacts_kubeconfig_shipped_obj | to_nice_yaml(indent=2) }}"
    dest: >-
      {{ export_artifacts_root }}/{{
        _export_artifacts_required_bootstrap_kubeconfig_filename
      }}
    mode: "{{ _export_artifacts_required_file_mode }}"
  delegate_to: localhost
  become: false
  run_once: true
