---
# Materialise a host-side kubeconfig for the bootstrap k3s cluster.
#
# k3s writes /etc/rancher/k3s/k3s.yaml inside the container with
# `server: https://127.0.0.1:6443` — useless from outside. We:
#   1) ensure the staging dir exists with restrictive ownership;
#   2) compare sha256 of in-container kubeconfig vs host-side staging
#      copy and `lxc file pull` only when they differ;
#   3) parse it as YAML, rewrite every `clusters[].cluster.server` URL
#      to point at the container's eth0 IPv4;
#   4) write the rewritten body to the staging path with mode 0600.
#
# Idempotence: step (2) is gated on a real checksum diff, so on an
# unchanged cluster the pull is skipped entirely (plan §2.6.1). Step (3)
# yields a deterministic body for the same inputs (container IP +
# in-container kubeconfig contents), so step (4) reports `changed=false`
# on the second converge.

- name: "bootstrap-clusterctl | kubeconfig | ensure staging dir on host"
  ansible.builtin.file:
    path:  "{{ bootstrap_clusterctl_staging_dir }}"
    state: directory
    owner: "root"
    group: "root"
    mode:  "{{ bootstrap_clusterctl_staging_mode_dir }}"

# Pre-check: compare in-container file checksum with the local staging
# copy (plan §2.6.1: fallback-шаг обязан быть идемпотентен через
# доп. обёртку, не через changed_when: false). On the first run the
# staging file does not exist → local checksum is empty → pull fires.
# On subsequent runs, identical checksums → pull is skipped.

- name: "bootstrap-clusterctl | kubeconfig | read in-container kubeconfig sha256"
  ansible.builtin.command:
    argv:
      - "{{ _bootstrap_clusterctl_lxc_cli }}"
      - "exec"
      - "--project={{ bootstrap_clusterctl_project }}"
      - "{{ bootstrap_clusterctl_instance_name }}"
      - "--"
      - "sha256sum"
      - "{{ _bootstrap_clusterctl_container_kubeconfig_path }}"
  register: _bootstrap_clusterctl_container_kubeconfig_sum_register
  changed_when: false

- name: "bootstrap-clusterctl | kubeconfig | stat local staging kubeconfig"
  ansible.builtin.stat:
    path:     "{{ bootstrap_clusterctl_staging_dir }}/k3s.yaml.raw"
    checksum_algorithm: sha256
  register: _bootstrap_clusterctl_local_kubeconfig_stat_register

- name: "bootstrap-clusterctl | kubeconfig | derive kubeconfig pull drift flag"
  ansible.builtin.set_fact:
    _bootstrap_clusterctl_kubeconfig_pull_needed: >-
      {{
        (_bootstrap_clusterctl_container_kubeconfig_sum_register.stdout.split()[0])
        != (_bootstrap_clusterctl_local_kubeconfig_stat_register.stat.checksum | default(''))
      }}

- name: "bootstrap-clusterctl | kubeconfig | pull in-container k3s kubeconfig"
  # `lxc file pull` shells out to the snap CLI — documented shell
  # fallback (plan §2.6.1). The community.general.lxd connection plugin
  # would require the controller to BE the LXD host, which it is not in
  # the Molecule harness (controller is the dev box, host is the
  # Vagrant VM). Idempotency is enforced by the sha256 pre-check above:
  # this step fires only when the in-container file differs from the
  # host-side staging copy.
  ansible.builtin.command:
    argv:
      - "{{ _bootstrap_clusterctl_lxc_cli }}"
      - "file"
      - "pull"
      - "--project={{ bootstrap_clusterctl_project }}"
      - "{{ bootstrap_clusterctl_instance_name }}{{ _bootstrap_clusterctl_container_kubeconfig_path }}"
      - "{{ bootstrap_clusterctl_staging_dir }}/k3s.yaml.raw"
  when: _bootstrap_clusterctl_kubeconfig_pull_needed
  changed_when: _bootstrap_clusterctl_kubeconfig_pull_needed

- name: "bootstrap-clusterctl | kubeconfig | read raw kubeconfig body"
  ansible.builtin.slurp:
    src: "{{ bootstrap_clusterctl_staging_dir }}/k3s.yaml.raw"
  register: _bootstrap_clusterctl_raw_register

- name: "bootstrap-clusterctl | kubeconfig | parse + rewrite server URL + pin tls-server-name"
  # Two rewrites in one combine(recursive=True) pass:
  #   * `server` — from k3s' useless `https://127.0.0.1:6443` to the
  #     container's eth0 IPv4 so host-side tools can reach the API;
  #   * `tls-server-name` — pinned to a stable SAN that's baked into
  #     the k3s cert by default (vars/main.yml substrate-locked). TLS
  #     match now uses the pinned string, NOT the host part of the URL,
  #     so the same kubeconfig bytes work both here (server=10.77.x)
  #     and for consumers that rewrite the URL to reach the API via an
  #     LXD proxy device (export_artifacts + §15.5).
  ansible.builtin.set_fact:
    _bootstrap_clusterctl_kubeconfig_body: >-
      {{
        (_bootstrap_clusterctl_raw_register.content | b64decode | from_yaml)
        | combine({
            'clusters': (
              (_bootstrap_clusterctl_raw_register.content | b64decode | from_yaml).clusters
              | map('combine', {
                  'cluster': {
                    'server': 'https://' ~ _bootstrap_clusterctl_container_ipv4 ~ ':6443',
                    'tls-server-name': _bootstrap_clusterctl_required_tls_server_name
                  }
                }, recursive=True)
              | list
            )
          }, recursive=True)
      }}

- name: "bootstrap-clusterctl | kubeconfig | write host-side kubeconfig"
  # `copy` with `content:` is byte-stable: ansible.builtin.copy compares
  # the rendered content to the existing file and skips the write when
  # they match. That gives us idempotence without an explicit drift
  # check.
  ansible.builtin.copy:
    content: "{{ _bootstrap_clusterctl_kubeconfig_body | to_nice_yaml(indent=2) }}"
    dest:    "{{ bootstrap_clusterctl_kubeconfig_path }}"
    owner:   "root"
    group:   "root"
    mode:    "{{ bootstrap_clusterctl_staging_mode_kubeconfig }}"
