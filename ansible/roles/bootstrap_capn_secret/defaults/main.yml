---
# ==========================================================================
# bootstrap_capn_secret — role defaults
# ==========================================================================
#
# Purpose (plan §15.4): materialise the LXD identity Secret CAPN reads
# to talk to the host LXD daemon. Three cross-cutting pieces:
#
#   1) host LXD HTTPS listener — `core.https_address` bound to the
#      capi-int bridge IP, so the bootstrap container can reach the
#      LXD API over the project's internal network and nothing on the
#      external segment is exposed;
#   2) client TLS cert/key — generated locally with community.crypto,
#      trusted into LXD as a `client`-type certificate restricted to
#      the `capi-lab` project so CAPN cannot touch foreign projects;
#   3) Kubernetes Secret in `capn-system` — keys per CAPN identity-
#      secret format: `server`, `server-crt`, `client-crt`,
#      `client-key`, `project` (+ optional `clusterctl.cluster.x-k8s.io/move`
#      label so `clusterctl move` carries it across to the post-pivot
#      management cluster — pivot is mandatory in the canonical k8s-lab
#      flow, plan §3 + §10).
#
# Public contract (plan §2.6.2): every variable exposed to callers is
# prefixed `bootstrap_capn_secret_*`. Internal / derived facts use the
# `_bootstrap_capn_secret_*` prefix.
#
# Substrate-required values (memory `feedback_required_values_hardcoded.md`):
# anything whose empty / wrong override would silently break the role
# lives in `vars/main.yml` under the `_bootstrap_capn_secret_required_*`
# prefix and is NOT exposed below. Concretely:
#   * Secret namespace (`capn-system`) — CAPN reads identity from there;
#   * Secret name (`incus-identity`) — CAPN docs default + Phase 5+
#     Cluster CR identityRef;
#   * snap-LXD socket / server.crt path — invariant for our lxd_host;
#   * LXD HTTPS port (8443) — CAPN-wide convention;
#   * required Secret data keys list (5 keys per CAPN identity spec).

# -- General ---------------------------------------------------------------

bootstrap_capn_secret_enabled: true

# Cross-role couplings — by value (plan §2.6.5 bans reading another
# role's `<other>_*` directly). Both pull from the project-wide §8
# globals so a single global change propagates into:
#   * the client cert's trust-store project restriction (lxd_trust.yml),
#   * the Secret's `project` stringData key (secret.yaml.j2) — CAPN
#     reads this at every CR reconcile to scope every LXCMachine call,
#   * `core.https_address` auto-resolution (it walks the LXD-managed
#     network named here to find the gateway IPv4 to bind to).
# Fall back to `capi-lab` / `capi-int` for standalone role runs
# (molecule, ad-hoc reruns) where the globals are unset.
bootstrap_capn_secret_lxd_project: "{{ k8s_lab_project_name | default('capi-lab') }}"
bootstrap_capn_secret_internal_network_name: "{{ k8s_lab_internal_network_name | default('capi-int') }}"

# Host-side kubeconfig produced by the bootstrap_clusterctl chain.
bootstrap_capn_secret_kubeconfig_path: "{{ k8s_lab_opt_root | default('/opt/capi-lab') }}/etc/bootstrap_clusterctl/bootstrap.kubeconfig"

# -- LXD HTTPS listener --------------------------------------------------
#
# `core.https_address` semantics (LXD docs):
#   * empty string  → HTTPS API disabled, only unix socket;
#   * `<host>:<port>` → bind to that host/port specifically;
#   * `[::]:<port>` → wildcard, all interfaces (NOT used by default).
#
# Default: auto-resolve the IPv4 of the capi-int LXD-managed bridge
# (which is the gateway address inside bootstrap LXC) and bind there
# only. That keeps the API endpoint reachable from the project's
# internal subnet but invisible on the host's external NICs.
#
# Override `bootstrap_capn_secret_lxd_https_bind_address` to a literal
# `<ip>:<port>` to skip auto-resolution. The PORT NUMBER (8443) is
# substrate-locked in vars/main.yml.
bootstrap_capn_secret_lxd_https_bind_address: ""   # empty → auto

# -- Client cert generation (community.crypto pipeline) -------------------

bootstrap_capn_secret_staging_dir: "{{ k8s_lab_opt_root | default('/opt/capi-lab') }}/etc/bootstrap_capn_secret"
bootstrap_capn_secret_client_key_path:  "{{ bootstrap_capn_secret_staging_dir }}/client.key"
bootstrap_capn_secret_client_csr_path:  "{{ bootstrap_capn_secret_staging_dir }}/client.csr"
bootstrap_capn_secret_client_cert_path: "{{ bootstrap_capn_secret_staging_dir }}/client.crt"

# Cert metadata. CN is the canonical "this client" identity in LXD's
# trust store; LXD displays it in `lxc config trust list`.
bootstrap_capn_secret_client_cert_cn: "k8slab-capn"
bootstrap_capn_secret_client_cert_country: "DE"
bootstrap_capn_secret_client_cert_organization: "k8s-lab"
bootstrap_capn_secret_client_cert_validity_days: 1095
bootstrap_capn_secret_client_key_size: 4096
bootstrap_capn_secret_client_key_type: "RSA"

# Filesystem ownership for cert artefacts. The private key is 0600
# root-only; the cert and CSR can be world-readable to ease debugging.
bootstrap_capn_secret_staging_mode_dir:  "0750"
bootstrap_capn_secret_staging_mode_key:  "0600"
bootstrap_capn_secret_staging_mode_cert: "0644"

# Trust-store entry name shown in `lxc config trust list`. Cosmetic.
bootstrap_capn_secret_trust_name: "k8slab-capn"

# -- Kubernetes Secret payload --------------------------------------------
#
# Secret name coordinated with the Cluster CR's `identityRef.name` in
# Phase 5+ (§16.4 / §16.5). Sources from the project-wide contract
# variable `k8s_lab_infrastructure_secret_name` (plan §8) so a single
# global change keeps both ends — the Secret produced here AND the
# Cluster CR identityRef downstream — in sync. Falls back to the CAPN
# docs default ("incus-identity") for standalone runs.
bootstrap_capn_secret_name: "{{ k8s_lab_infrastructure_secret_name | default('incus-identity') }}"

# Whether `clusterctl.cluster.x-k8s.io/move: "true"` label is added.
# Default `true` — pivot is mandatory in the canonical k8s-lab flow
# (plan §3 + §10), so the move label must always be present so
# `clusterctl move` (plan §18) carries the Secret across to the
# post-pivot management cluster. Override to `false` only for ad-hoc
# substrate-only test runs that intentionally skip pivot.
bootstrap_capn_secret_pivot_enabled: true

# Target namespaces where the CAPN identity Secret must be materialised
# (plan §13.11 + §16.3). CAPN v1alpha2 `LXCCluster.spec.secretRef` does
# NOT carry a namespace field — CAPN looks the Secret up in the same
# namespace as the LXCCluster CR (i.e. the workload Cluster CR's
# namespace). The role therefore creates the Secret in EVERY namespace
# listed here. The role also ensures each target namespace exists
# before applying the Secret; consumers (Phase 5 helm_release with
# `create_namespace = true`) see the namespace already present and
# treat it as no-op.
#
# Sourced from the project-wide `k8s_lab_capn_identity_namespaces`
# (plan §8). Default `["capi-clusters"]` matches charts/capi-workload-cluster
# default Release.Namespace. Empty list is valid — HTTPS listener +
# LXD trust still execute (they are substrate, not per-cluster), and
# Secret apply / healthchecks short-circuit. Multi-cluster operators
# add per-tenant namespaces here.
bootstrap_capn_secret_namespaces: "{{ k8s_lab_capn_identity_namespaces | default(['capi-clusters']) }}"

# Rendered Secret manifest staged on the host for ops audit. The
# runtime apply path uses the in-memory definition, this file is
# byte-stable read-only artefact.
bootstrap_capn_secret_manifest_path: "{{ bootstrap_capn_secret_staging_dir }}/secret.yaml"

# -- Wait timing ----------------------------------------------------------
#
# Used by the post-PATCH listener readiness loop (`core.https_address`
# change is async — the daemon rebinds and a subsequent immediate
# request can hit the gap).
bootstrap_capn_secret_wait_retries: 30
bootstrap_capn_secret_wait_delay:   2

# -- Flow control (plan §2.6.3) -------------------------------------------

bootstrap_capn_secret_flow_control_lxd_https:   true
bootstrap_capn_secret_flow_control_client_cert: true
bootstrap_capn_secret_flow_control_lxd_trust:   true
bootstrap_capn_secret_flow_control_secret:      true
