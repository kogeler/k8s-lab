---
galaxy_info:
  role_name: bootstrap_capn_secret
  namespace: k8slab
  author: k8s-lab contributors
  description: >-
    Materialise the LXD identity Secret CAPN reads to talk to the host
    daemon (plan §13.11). Generates a client cert/key, trusts it into
    LXD restricted to the project from k8s_lab_project_name, exposes
    the LXD HTTPS listener on the LXD-managed internal bridge, and
    applies the Secret in every namespace listed in
    k8s_lab_capn_identity_namespaces (default ["capi-clusters"]) — the
    workload Cluster CR namespaces where CAPN will look up
    LXCCluster.spec.secretRef at reconcile time.
  license: MIT
  min_ansible_version: "2.16"
  platforms:
    - name: Debian
      versions:
        - trixie
  galaxy_tags:
    - kubernetes
    - clusterapi
    - lxd
    - bootstrap

dependencies:
  # bootstrap_clusterctl creates the capn-system namespace (via
  # clusterctl init --infrastructure incus) and brings the host-side
  # kubeconfig + kubectl binary in scope. It transitively pulls
  # bootstrap_k3s and the rest of the substrate chain.
  - role: bootstrap_clusterctl
