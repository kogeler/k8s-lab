---
# Role-internal healthchecks (plan §2.6.6). Re-probe live state from
# the host independently of the role's own apply tasks to catch drift
# between the rendered manifest and what actually landed in the
# cluster / LXD trust store.
#
# Per-namespace Secret healthchecks loop over
# `bootstrap_capn_secret_namespaces`. Empty list → those checks skip
# entirely (the per-task `when` guard short-circuits), but LXD trust
# / fingerprint healthchecks always run since they cover substrate-
# level state independent of the per-cluster fanout.

# ---- Secret exists in every target namespace, with all required keys ---

- name: "bootstrap-capn-secret | healthchecks | fetch live Secret per namespace"
  kubernetes.core.k8s_info:
    kubeconfig: "{{ bootstrap_capn_secret_kubeconfig_path }}"
    api_version: "v1"
    kind: "Secret"
    namespace: "{{ item }}"
    name: "{{ bootstrap_capn_secret_name }}"
  register: _bootstrap_capn_secret_get_register
  loop: "{{ bootstrap_capn_secret_namespaces }}"
  loop_control:
    label: "{{ item }}"

- name: "bootstrap-capn-secret | healthchecks | assert Secret + keys + label per namespace"
  ansible.builtin.assert:
    that:
      # Exactly one Secret object returned per namespace probe.
      - (item.resources | length) == 1
      # All 5 required keys present on the live Secret.
      - >-
        (
          _bootstrap_capn_secret_required_keys
          | difference(
              (item.resources[0].data | default({})).keys() | list | sort
            )
        ) | length == 0
      # Pivot label discipline: present iff bootstrap_capn_secret_pivot_enabled.
      - >-
        (
          (bootstrap_capn_secret_pivot_enabled | bool)
          and (
            (item.resources[0].metadata.labels | default({}))
            ['clusterctl.cluster.x-k8s.io/move'] | default('') == 'true'
          )
        )
        or
        (
          (not (bootstrap_capn_secret_pivot_enabled | bool))
          and (
            ((item.resources[0].metadata.labels | default({}))
             ['clusterctl.cluster.x-k8s.io/move'] | default('')) | length == 0
          )
        )
    fail_msg: >-
      bootstrap_capn_secret healthcheck failed for namespace
      "{{ item.item }}": Secret {{ bootstrap_capn_secret_name }} not
      found OR missing required keys OR pivot label mismatch.
      live data keys =
      {{ (item.resources[0].data | default({})).keys() | list | sort }};
      live labels =
      {{ item.resources[0].metadata.labels | default({}) }};
      pivot_enabled = {{ bootstrap_capn_secret_pivot_enabled }}.
  loop: "{{ _bootstrap_capn_secret_get_register.results }}"
  loop_control:
    label: "{{ item.item }}"

# ---- LXD trust store membership reflects role state -------------------

- name: "bootstrap-capn-secret | healthchecks | re-probe LXD trust by fingerprint"
  ansible.builtin.uri:
    url:         "http://localhost/1.0/certificates/{{ _bootstrap_capn_secret_client_fingerprint }}"
    unix_socket: "{{ _bootstrap_capn_secret_lxd_socket }}"
    method:      GET
    status_code: 200
    return_content: true
  register: _bootstrap_capn_secret_trust_recheck_register
  changed_when: false

- name: "bootstrap-capn-secret | healthchecks | assert trust entry shape"
  ansible.builtin.assert:
    that:
      - (_bootstrap_capn_secret_trust_recheck_register.json.metadata.type | default('')) == _bootstrap_capn_secret_required_trust_type
      - (_bootstrap_capn_secret_trust_recheck_register.json.metadata.restricted | default(false)) | bool
      - bootstrap_capn_secret_lxd_project in (_bootstrap_capn_secret_trust_recheck_register.json.metadata.projects | default([]))
    fail_msg: >-
      bootstrap_capn_secret healthcheck failed: LXD trust entry shape
      drift. type=
      {{ _bootstrap_capn_secret_trust_recheck_register.json.metadata.type | default('?') }},
      restricted=
      {{ _bootstrap_capn_secret_trust_recheck_register.json.metadata.restricted | default('?') }},
      projects=
      {{ _bootstrap_capn_secret_trust_recheck_register.json.metadata.projects | default([]) }}.
