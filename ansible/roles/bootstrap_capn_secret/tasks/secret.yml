---
# Materialise the CAPN identity Secret in every workload-cluster
# namespace from `bootstrap_capn_secret_namespaces` (plan §13.11).
#
# Architectural truth (plan §16.3): CAPN v1alpha2 LXCCluster.spec.secretRef
# does not carry a namespace field — CAPN looks the Secret up in the
# namespace of the LXCCluster CR (i.e. the workload Cluster CR's own
# namespace). The Secret is therefore NOT created in the CAPN
# controller namespace (`capn-system`); it is fanned out across every
# namespace where workload Cluster CRs will live.
#
# Empty `bootstrap_capn_secret_namespaces` → every task in this file
# becomes a no-op (per-task `when` guard). HTTPS listener + LXD trust
# still execute (they are substrate-level concerns owned by lxd_https.yml
# and lxd_trust.yml respectively, not per-cluster).

- name: "bootstrap-capn-secret | secret | render Secret manifest body for audit"
  # `template` writes the rendered manifests to staging dir for ops
  # audit / debugging only; the runtime apply path uses the
  # in-memory `definition:` below. Multi-doc YAML — one Secret per
  # target namespace, separated by `---`. Same byte stream rendered
  # by template + apply path → idempotent on rerun.
  ansible.builtin.template:
    src:   "secret.yaml.j2"
    dest:  "{{ bootstrap_capn_secret_manifest_path }}"
    owner: "root"
    group: "root"
    mode:  "{{ bootstrap_capn_secret_staging_mode_key }}"   # carries client.key
  when: bootstrap_capn_secret_namespaces | length > 0

- name: "bootstrap-capn-secret | secret | ensure target namespaces exist"
  # The role owns this prerequisite so it is self-sufficient: workload
  # Cluster CR namespaces may not yet exist when Phase 4 runs (Phase 5
  # helm_release.create_namespace = true would otherwise be the
  # creator). `kubernetes.core.k8s` with `state: present` is
  # idempotent on Namespace → existing namespace is no-op.
  kubernetes.core.k8s:
    kubeconfig: "{{ bootstrap_capn_secret_kubeconfig_path }}"
    state: present
    apply: true
    definition:
      apiVersion: "v1"
      kind: "Namespace"
      metadata:
        name: "{{ item }}"
  loop: "{{ bootstrap_capn_secret_namespaces }}"
  loop_control:
    label: "{{ item }}"

- name: "bootstrap-capn-secret | secret | apply Secret in each target namespace"
  # `state: present` is reconciling: missing → created, drift →
  # patched, identical → no-op. `apply: true` selects the server-side
  # apply strategy (matches `kubectl apply --server-side`), giving us
  # idempotence + 3-way merge semantics consistent across reruns and
  # across the namespace fanout.
  kubernetes.core.k8s:
    kubeconfig: "{{ bootstrap_capn_secret_kubeconfig_path }}"
    state: present
    apply: true
    definition:
      apiVersion: "v1"
      kind: "Secret"
      type: "Opaque"
      metadata:
        name: "{{ bootstrap_capn_secret_name }}"
        namespace: "{{ item }}"
        # Conditionally-included label: pivot-on adds the `move`
        # marker, pivot-off omits it (and a follow-up apply with the
        # flag flipped will idempotently add or remove the label —
        # server-side apply field-manager handles the diff cleanly
        # across all target namespaces in parallel).
        labels: >-
          {{
            {'clusterctl.cluster.x-k8s.io/move': 'true'}
            if bootstrap_capn_secret_pivot_enabled
            else {}
          }}
      stringData:
        server:     "https://{{ _bootstrap_capn_secret_https_target }}"
        project:    "{{ bootstrap_capn_secret_lxd_project }}"
        server-crt: "{{ _bootstrap_capn_secret_server_cert_pem }}"
        client-crt: "{{ _bootstrap_capn_secret_client_cert_pem }}"
        client-key: "{{ _bootstrap_capn_secret_client_key_pem }}"
  loop: "{{ bootstrap_capn_secret_namespaces }}"
  loop_control:
    label: "{{ item }}"
