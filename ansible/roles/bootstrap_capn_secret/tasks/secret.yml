---
# Apply the CAPN identity Secret to the bootstrap k3s cluster via the
# native kubernetes.core.k8s module. We render the manifest body once
# in a fact (uniform inputs ⇒ deterministic body), then pass it as
# `definition:` so the module reads / patches the live resource for us
# — no shell, no kubectl drift parsing.

- name: "bootstrap-capn-secret | secret | render Secret manifest body"
  # `template` writes the same manifest to staging dir for ops audit /
  # debugging; the runtime apply path uses the in-memory definition
  # built below. Two renders of the same body keep idempotence on the
  # disk side too.
  ansible.builtin.template:
    src:   "secret.yaml.j2"
    dest:  "{{ bootstrap_capn_secret_manifest_path }}"
    owner: "root"
    group: "root"
    mode:  "{{ bootstrap_capn_secret_staging_mode_key }}"   # carries client.key

- name: "bootstrap-capn-secret | secret | apply Secret via kubernetes.core.k8s"
  # `state: present` is reconciling: missing → created, drift →
  # patched, identical → no-op. `apply: true` selects the server-side
  # apply strategy (matches `kubectl apply --server-side`), giving us
  # idempotence + 3-way merge semantics consistent across reruns.
  kubernetes.core.k8s:
    kubeconfig: "{{ bootstrap_capn_secret_kubeconfig_path }}"
    state: present
    apply: true
    definition:
      apiVersion: "v1"
      kind: "Secret"
      type: "Opaque"
      metadata:
        name: "{{ bootstrap_capn_secret_name }}"
        namespace: "{{ _bootstrap_capn_secret_required_namespace }}"
        # Conditionally-included label: pivot-on adds the `move`
        # marker, pivot-off omits it (and a follow-up apply with the
        # flag flipped will idempotently add or remove the label).
        labels: >-
          {{
            {'clusterctl.cluster.x-k8s.io/move': 'true'}
            if bootstrap_capn_secret_pivot_enabled
            else {}
          }}
      stringData:
        server:     "https://{{ _bootstrap_capn_secret_https_target }}"
        project:    "{{ bootstrap_capn_secret_lxd_project }}"
        server-crt: "{{ _bootstrap_capn_secret_server_cert_pem }}"
        client-crt: "{{ _bootstrap_capn_secret_client_cert_pem }}"
        client-key: "{{ _bootstrap_capn_secret_client_key_pem }}"
