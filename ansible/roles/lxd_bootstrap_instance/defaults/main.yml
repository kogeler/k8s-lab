---
# ==========================================================================
# lxd_bootstrap_instance — role defaults
# ==========================================================================
#
# Purpose (plan §13.7): create and start the LXC bootstrap container —
# `capi-bootstrap-0` by default — inside the capi-lab project. The
# container hosts single-node k3s + clusterctl in later phases
# (bootstrap_k3s / bootstrap_clusterctl); this role only owns the
# instance object + its lifecycle.
#
# Scope:
#   * one container per role run.
#   * always applies the `capi-base` + `capi-bootstrap` profiles
#     (baked into `vars/main.yml` as
#     `_lxd_bootstrap_instance_required_profiles`) — nesting,
#     unprivileged, root disk on capi-fast, eth0 on capi-int.
#     Consumers append extras via `lxd_bootstrap_instance_extra_profiles`.
#   * does NOT install k3s / kubectl / clusterctl — those land via
#     binary_fetch (Phase 3.5) and bootstrap_k3s / bootstrap_clusterctl
#     (Phase 4) into an already-running container.
#
# Public contract (plan §2.6.2): every variable exposed to callers is
# prefixed `lxd_bootstrap_instance_*`. Internal / derived facts use
# the `_lxd_bootstrap_instance_*` prefix.

# -- General ---------------------------------------------------------------

# Whole-role toggle. When false, preflight still runs (to catch
# inconsistent inputs) but no mutating task is applied.
lxd_bootstrap_instance_enabled: true

# LXD daemon socket URI consumed by community.general.lxd_container
# (URI form, not bare path — the module expects the `unix:` prefix).
lxd_bootstrap_instance_lxd_socket_uri: "unix:/var/snap/lxd/common/lxd/unix.socket"

# LXD project the instance lives in. Must match lxd_project_name on
# the host. Cross-role coupling is by value — plan §2.6.5 bans reading
# another role's `<other_role>_*` prefix directly.
lxd_bootstrap_instance_project: "capi-lab"

# -- Instance identity + shape --------------------------------------------

lxd_bootstrap_instance_name: "capi-bootstrap-0"
lxd_bootstrap_instance_type: "container"   # container | virtual-machine

# Profiles to apply.
#
# The substrate-required profiles live in `vars/main.yml` as
# `_lxd_bootstrap_instance_required_profiles` (capi-base + capi-bootstrap);
# removing either breaks k3s startup (missing nesting / kmsg / idmap —
# see lxd_profiles/vars/main.yml). `lxd_bootstrap_instance_extra_profiles`
# appends on top for optional per-instance profiles (e.g. a local
# diagnostics profile). LXD applies profiles left-to-right, so extras
# can layer keys on top of the required baseline.
lxd_bootstrap_instance_extra_profiles: []

# -- Image source ---------------------------------------------------------
#
# Default uses Canonical's LXD-curated simplestreams remote — that is
# the `images:` remote on a stock LXD snap (URL changed from
# `linuxcontainers.org` to `images.lxd.canonical.com` in LXD 5.x+
# after the Canonical/Incus split). The `debian/13` alias matches the
# host OS (plan §2.1 Debian 13 Trixie) so k3s bootstrap inherits
# predictable kernel semantics. Consumers can pin to a specific
# fingerprint or switch to the UBC remote
# (https://cloud-images.ubuntu.com/releases/ + `24.04` / etc).
lxd_bootstrap_instance_image_server:   "https://images.lxd.canonical.com"
lxd_bootstrap_instance_image_protocol: "simplestreams"
lxd_bootstrap_instance_image_alias:    "debian/13"

# -- Per-instance overlays -----------------------------------------------
#
# Merged on top of whatever the applied profiles provide. Keep empty
# by default — profile contract covers every Stage 1 requirement.
lxd_bootstrap_instance_config: {}
lxd_bootstrap_instance_devices: {}

# -- Lifecycle -----------------------------------------------------------

# Desired LXD state. `started` creates + launches the container;
# `stopped` ensures it exists but is offline; `absent` deletes it.
lxd_bootstrap_instance_state: "started"

# Role-owned readiness gate. When true, after the LXD state transition
# settles, `tasks/wait_ready.yml` polls LXD REST until a SINGLE named
# interface (below) has a non-link-local IPv4. This is the contract
# downstream roles actually need — `bootstrap_k3s` reaches the
# container over eth0, and it does not care about transient CNI
# veth/cni*/flannel* interfaces k3s creates inside. Using the stock
# `community.general.lxd_container` `wait_for_ipv4_addresses: true`
# flag was the previous approach; it demands IPv4 on EVERY non-lo
# interface, which hangs at `wait_timeout` once inner k3s brings up
# veth-pairs without IPv4. This role keeps `wait_for_container: true`
# on the module call (so the module blocks on image-pull / start
# operations) but drops the broken per-interface IPv4 wait.
lxd_bootstrap_instance_wait_ready: true

# Name of the container-side nic the readiness gate polls. Defaults
# to the internal-plane nic from the `capi-base` profile (plan §5.3
# `k8s_lab_guest_internal_ifname`). Consumers with a non-standard layout set
# this explicitly.
lxd_bootstrap_instance_readiness_ifname: "eth0"

# Shared wall-clock budget for: (a) `community.general.lxd_container`
# wait_for_container (image pull + start); (b) role-owned readiness
# poll. The readiness poll uses retries = wait_timeout // 4 with a
# 4-second delay, so the total ceiling matches the number below.
lxd_bootstrap_instance_wait_timeout: 120

# -- Flow control (plan §2.6.3) -------------------------------------------
#
# Coarse-grained only.
lxd_bootstrap_instance_flow_control_instance: true
