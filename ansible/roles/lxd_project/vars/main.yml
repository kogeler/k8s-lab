---
# ==========================================================================
# lxd_project — substrate-required project policy
# ==========================================================================
#
# Role-internal. Holds the project features + restrictions the role
# exists to enforce. NONE of these are user-overridable through
# defaults: any of them being missing breaks the rest of the substrate
# (lxd_profiles can't apply nested k8s nodes, lxd_storage_pools can't
# attach managed disks, /dev/kmsg passthrough is rejected, …). Per
# memory `feedback_required_values_hardcoded.md`, mandatory toggles
# live here, not in `defaults/main.yml`. Consumers add tuning on top
# via `lxd_project_extra_restrictions` (defaults), merged in
# `tasks/project.yml`.

# Project feature isolation. `images`/`profiles`/`storage.*` are the
# project's own — `networks`/`networks.zones` deliberately fall back to
# the default project's read-only view (LXD does not allow `bridge`
# networks in non-default projects; see plan §13.5 deviation).
_lxd_project_required_features:
  images:          true
  profiles:        true
  networks:        false
  networks.zones:  false
  storage.volumes: true
  storage.buckets: true

# `restricted=true` enables the positive allow-list below (plan §2.3).
# Hardcoded — the role's whole purpose is to apply restrictions.
_lxd_project_required_restricted: true

# Substrate-required allow-list. Every key here is consumed by another
# role in this repo:
#
# - containers.nesting    → lxd_profiles enables nesting on every k8s profile
# - containers.privilege  → plan §2.8 hard-locks unprivileged
# - containers.lowlevel   → unlocks raw.lxc + linux.kernel_modules on profiles
# - containers.interception → unlocks security.syscalls.intercept.* on profiles
# - devices.disk          → lxd_storage_pools attaches managed-pool disks
# - devices.nic           → lxd_profiles attaches eth1 to br-ext6 (unmanaged)
# - devices.unix-char     → lxd_profiles maps host /dev/kmsg into k8s nodes
# - devices.proxy         → plan §15.5 — опциональная публикация портов
#                          контейнера наружу (k3s API для Terraform
#                          runner) выполняется через LXD proxy device,
#                          передаваемый консумером в
#                          `lxd_bootstrap_instance_devices`. Project
#                          policy обязан разрешать proxy devices,
#                          иначе substrate's canonical publish path
#                          сломан. Host firewall по-прежнему вне scope
#                          (§11.4).
_lxd_project_required_restrictions:
  restricted.containers.nesting:      "allow"
  restricted.containers.privilege:    "unprivileged"
  restricted.containers.lowlevel:     "allow"
  restricted.containers.interception: "allow"
  restricted.devices.disk:            "managed"
  restricted.devices.nic:             "allow"
  restricted.devices.unix-char:       "allow"
  restricted.devices.proxy:           "allow"
