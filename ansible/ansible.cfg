[defaults]
roles_path              = ./roles
# Collections live under ansible/collections/ (project-local, gitignored).
# The path is resolved relative to the current working directory when
# ansible is invoked; for robustness, the Makefile also exports
# ANSIBLE_COLLECTIONS_PATH with an absolute path so invocations from
# any subdirectory (e.g. Molecule scenarios) still find them.
collections_path        = ./collections
inventory               = ./inventory
host_key_checking       = False
retry_files_enabled     = False
stdout_callback         = yaml
bin_ansible_callbacks   = True
forks                   = 20
timeout                 = 30
deprecation_warnings    = True
nocows                  = 1
interpreter_python      = auto_silent

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
pipelining              = True
ssh_args                = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
control_path            = /tmp/ansible-ssh-%%h-%%p-%%r
