name: Feature / enhancement
description: Propose a new feature, enhancement, or Stage 2 backlog item.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please check `plans/PLAN-stage2-common.md` first — many likely
        enhancements are already in the backlog with a design rationale.
        See `CONTRIBUTING.md` for items that are intentionally out of scope
        (privileged LXC, multi-CNI runtime toggles, host firewall, etc.).
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Concrete sketch — which role / chart / module would change, and how.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Confirmations
      options:
        - label: I have read `CONTRIBUTING.md` and this is in scope.
          required: true
        - label: I have searched the `plans/` directory for an existing entry.
          required: true
