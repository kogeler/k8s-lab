name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "doc/**"
      - "mkdocs.yml"
      - "scripts/docs_hooks.py"
      - "requirements-docs.txt"
      - ".github/site-root/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress runs so a
# deploy can finish even if a follow-up push lands while it is publishing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Build site
        run: mkdocs build

      - name: Copy .github/site-root/ extras into deployed site
        # Anything under .github/site-root/ is copied verbatim to the
        # deployed Pages site root. Use for search-engine verification
        # files (Google, Bing, etc.), /.well-known/ entries,
        # ads.txt, security.txt, etc. — files that must live at the site
        # root but are not part of the mkdocs documentation tree.
        run: |
          if [[ -d .github/site-root ]] && compgen -G ".github/site-root/*" >/dev/null; then
            cp -rv .github/site-root/. site/
          else
            echo ".github/site-root/ empty or missing — nothing to copy"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
